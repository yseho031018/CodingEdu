<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title th:text="${challenge.title} + ' - CodeEdu'">챌린지 상세 - CodeEdu</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/tailwind.css">
    <style>
        .detail-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 32px;
            padding: 48px 5%;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 메인 */
        .detail-card {
            background: var(--bg-surface);
            border-radius: 24px;
            padding: 40px;
            border: 2px solid var(--border-card);
        }
        .detail-card.featured { background: linear-gradient(135deg, var(--amber-soft), var(--amber-soft)); border-color: var(--amber); }

        .detail-header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 28px; }
        .detail-icon { font-size: 4rem; flex-shrink: 0; }
        .detail-title-block h1 { font-size: 1.8rem; font-weight: 900; color: var(--ink-1); margin-bottom: 8px; }

        .status-badge {
            display: inline-block;
            padding: 4px 14px; border-radius: 50px;
            font-size: .8rem; font-weight: 700;
        }
        .status-active { background: var(--success-soft); color: var(--success); }
        .status-upcoming { background: var(--accent-soft); color: var(--accent); }
        .status-joined { background: var(--success-soft); color: var(--success); margin-left: 8px; }

        .detail-description {
            font-size: 1rem; color: var(--ink-2); line-height: 1.8;
            margin-bottom: 32px; padding: 20px; background: rgba(255,255,255,0.7);
            border-radius: 12px; border-left: 4px solid var(--accent-h);
        }

        .stats-row {
            display: flex; gap: 24px; margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .stat-box {
            flex: 1; min-width: 100px;
            background: var(--bg-section); border-radius: 16px; padding: 20px;
            text-align: center; border: 1px solid var(--border-card);
        }
        .stat-box .num { font-size: 2rem; font-weight: 900; color: var(--accent); }
        .stat-box .lbl { font-size: .82rem; color: var(--ink-3); margin-top: 4px; }

        /* 진행 바 (active) */
        .progress-section { margin-bottom: 32px; }
        .progress-label { display: flex; justify-content: space-between; font-size: .88rem; font-weight: 700; color: var(--ink-2); margin-bottom: 8px; }
        .big-bar { height: 14px; background: var(--border); border-radius: 10px; overflow: hidden; }
        .big-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-h), var(--amber)); border-radius: 10px; transition: width .5s; }
        .progress-msg { margin-top: 8px; font-size: .88rem; font-weight: 700; color: var(--ink-2); text-align: right; }

        /* 일정 정보 */
        .date-info { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
        .date-chip {
            background: var(--accent-soft); color: var(--accent);
            padding: 8px 16px; border-radius: 50px;
            font-size: .85rem; font-weight: 700;
        }

        /* 사이드바 */
        .side-card {
            background: var(--bg-surface);
            border-radius: 24px;
            padding: 32px 28px;
            border: 2px solid var(--border-card);
            position: sticky;
            top: 80px;
            height: fit-content;
        }
        .side-card h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 20px; color: var(--ink-1); }

        .btn-join {
            display: block; width: 100%; padding: 16px;
            background: var(--accent); color: #fff;
            border: none; border-radius: 14px;
            font-size: 1.05rem; font-weight: 800;
            cursor: pointer; transition: all .2s; text-align: center;
            text-decoration: none; margin-bottom: 12px;
        }
        .btn-join:hover { background: var(--accent-h); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(107,92,231,.3); }
        .btn-join.joined { background: var(--success); }
        .btn-join.joined:hover { background: var(--success); }
        .btn-leave {
            display: block; width: 100%; padding: 12px;
            background: var(--bg-surface); color: var(--ink-3);
            border: 2px solid var(--border-card); border-radius: 14px;
            font-size: .9rem; font-weight: 700;
            cursor: pointer; transition: all .2s; text-align: center;
            text-decoration: none; margin-bottom: 12px;
        }
        .btn-leave:hover { border-color: var(--danger); color: var(--danger); }
        .btn-lock-side {
            display: block; width: 100%; padding: 16px;
            background: var(--bg-section); color: var(--ink-3);
            border: none; border-radius: 14px;
            font-size: 1rem; font-weight: 700; text-align: center;
            text-decoration: none; margin-bottom: 12px;
        }
        .side-info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-card); font-size: .88rem; }
        .side-info-row:last-child { border-bottom: none; }
        .side-info-label { color: var(--ink-3); }
        .side-info-value { font-weight: 700; color: var(--ink-1); }

        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--ink-3); text-decoration: none; font-size: .9rem; margin-bottom: 28px; }
        .back-link:hover { color: var(--accent); }

        @media (max-width: 768px) {
            .detail-layout { grid-template-columns: 1fr; }
            .side-card { position: static; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>


<div style="padding: 24px 5% 0; max-width: 1100px; margin: 0 auto;">
    <a href="/challenge" class="back-link">← 챌린지 목록으로</a>
</div>

<!-- 완료 인증 토스트 -->
<div th:if="${completeMsg}"
     style="max-width:1100px; margin:20px auto 0; padding:0 5%;">
    <div style="background:var(--success-soft); border-left:4px solid var(--success); color:var(--success); padding:14px 18px; border-radius:10px; font-weight:700; font-size:.95rem;"
         th:text="${completeMsg}"></div>
</div>

<div class="detail-layout">

    <!-- 메인 정보 -->
    <main>
        <div class="detail-card reveal" th:classappend="${challenge.featured ? 'featured' : ''}">
            <div class="detail-header">
                <div class="detail-icon" th:text="${challenge.icon}">🚀</div>
                <div class="detail-title-block">
                    <h1 th:text="${challenge.title}">챌린지명</h1>
                    <span class="status-badge"
                          th:classappend="${challenge.status == 'active' ? 'status-active' : 'status-upcoming'}"
                          th:text="${challenge.status == 'active' ? '🟢 진행중' : '🔵 오픈 예정'}">진행중</span>
                    <span class="status-joined" th:if="${joined}">✔ 참여중</span>
                </div>
            </div>

            <p class="detail-description" th:text="${challenge.description}">설명</p>

            <!-- 통계 -->
            <div class="stats-row">
                <div class="stat-box">
                    <div class="num" th:text="${participantCount}">0</div>
                    <div class="lbl">참여자</div>
                </div>
                <div class="stat-box" th:if="${challenge.status == 'active'}">
                    <div class="num" th:text="${daysLeft}">0</div>
                    <div class="lbl">남은 일수</div>
                </div>
                <div class="stat-box" th:if="${challenge.status == 'upcoming'}">
                    <div class="num" th:text="'D-' + ${daysLeft}">D-0</div>
                    <div class="lbl">오픈까지</div>
                </div>
                <div class="stat-box">
                    <div class="num" th:text="${challenge.totalTasks}">30</div>
                    <div class="lbl">총 미션</div>
                </div>
                <div class="stat-box" th:if="${challenge.status == 'active'}">
                    <div class="num" th:text="${progressPct} + '%'">0%</div>
                    <div class="lbl">진행률</div>
                </div>
            </div>

            <!-- 진행 바 (active만) -->
            <div class="progress-section" th:if="${challenge.status == 'active'}">
                <div class="progress-label">
                    <span>챌린지 진행 현황</span>
                    <span th:text="${progressPct} + '%'">0%</span>
                </div>
                <div class="big-bar">
                    <div class="big-bar-fill" th:style="'width:' + ${progressPct} + '%'"></div>
                </div>
                <div class="progress-msg"
                     th:text="${challenge.progressMessage != null ? challenge.progressMessage : '지금 바로 시작하세요! 🚀'}"></div>
            </div>

            <!-- 일정 -->
            <div class="date-info">
                <span class="date-chip"
                      th:text="'📅 시작: ' + ${#temporals.format(challenge.startDate, 'yyyy.MM.dd')}">📅 시작</span>
                <span class="date-chip" th:if="${challenge.endDate != null}"
                      th:text="'🏁 종료: ' + ${#temporals.format(challenge.endDate, 'yyyy.MM.dd')}">🏁 종료</span>
                <span class="date-chip"
                      th:text="'⏱ 기간: ' + ${challenge.totalTasks} + '일'">⏱ 기간</span>
            </div>
        </div>
    </main>

    <!-- 사이드바 -->
    <aside>
        <div class="side-card">
            <h3>참여 정보</h3>

            <!-- 로그인 + active + 미참여 -->
            <th:block sec:authorize="isAuthenticated()">
                <th:block th:if="${challenge.status == 'active'}">
                    <th:block th:if="${!joined}">
                        <form th:action="@{/challenge/{id}/join(id=${challenge.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn-join">🎯 참여하기</button>
                        </form>
                    </th:block>
                    <th:block th:if="${joined}">
                        <!-- 완료 인증된 경우 -->
                        <th:block th:if="${participation != null and participation.completed}">
                            <div style="background:var(--success-soft); border-radius:12px; padding:16px; text-align:center; margin-bottom:12px;">
                                <div style="font-size:1.5rem; margin-bottom:6px;">🏅</div>
                                <div style="font-weight:800; color:var(--success); font-size:.95rem;">완료 인증됨!</div>
                                <div style="font-size:.78rem; color:var(--ink-3); margin-top:4px;"
                                     th:text="${#temporals.format(participation.completedAt, 'yyyy.MM.dd HH:mm')}"></div>
                                <a th:if="${participation.githubUrl != null}"
                                   th:href="${participation.githubUrl}"
                                   target="_blank" rel="noopener"
                                   style="display:inline-block; margin-top:8px; font-size:.8rem; color:var(--accent); font-weight:700; word-break:break-all;">
                                    🔗 GitHub 링크 보기
                                </a>
                            </div>
                        </th:block>
                        <!-- 완료 인증 안 된 경우 -->
                        <th:block th:if="${participation == null or !participation.completed}">
                            <span class="btn-join joined" style="display:block; margin-bottom:10px;">✅ 참여중입니다!</span>
                            <!-- 완료 인증 폼 -->
                            <details style="margin-bottom:10px;">
                                <summary style="cursor:pointer; font-size:.85rem; font-weight:700; color:var(--accent); padding:8px 0;">🏁 완료 인증하기</summary>
                                <form th:action="@{/challenge/{id}/complete(id=${challenge.id})}" method="post" style="margin-top:10px;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="url" name="githubUrl" placeholder="GitHub 링크 (선택사항)"
                                           style="width:100%; padding:8px 12px; border:1.5px solid var(--border-card); border-radius:8px; font-size:.82rem; margin-bottom:8px; box-sizing:border-box;">
                                    <button type="submit" class="btn-join" style="background:var(--success); font-size:.85rem; padding:10px;">🎉 완료 인증</button>
                                </form>
                            </details>
                            <form th:action="@{/challenge/{id}/leave(id=${challenge.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn-leave">참여 취소</button>
                            </form>
                        </th:block>
                    </th:block>
                </th:block>
                <th:block th:if="${challenge.status == 'upcoming'}">
                    <span class="btn-lock-side">🔵 아직 오픈 전이에요</span>
                </th:block>
            </th:block>

            <!-- 비로그인 -->
            <th:block sec:authorize="isAnonymous()">
                <a href="/login" class="btn-join">🔒 로그인 후 참여 가능</a>
            </th:block>

            <div style="margin-top: 20px;">
                <div class="side-info-row">
                    <span class="side-info-label">상태</span>
                    <span class="side-info-value"
                          th:text="${challenge.status == 'active' ? '진행중' : '오픈 예정'}">진행중</span>
                </div>
                <div class="side-info-row">
                    <span class="side-info-label">참여자</span>
                    <span class="side-info-value" th:text="${participantCount} + '명'">0명</span>
                </div>
                <div class="side-info-row">
                    <span class="side-info-label">총 미션</span>
                    <span class="side-info-value" th:text="${challenge.totalTasks} + '개'">0개</span>
                </div>
                <div class="side-info-row">
                    <span class="side-info-label">시작일</span>
                    <span class="side-info-value"
                          th:text="${#temporals.format(challenge.startDate, 'yyyy.MM.dd')}">-</span>
                </div>
                <div class="side-info-row" th:if="${challenge.endDate != null}">
                    <span class="side-info-label">종료일</span>
                    <span class="side-info-value"
                          th:text="${#temporals.format(challenge.endDate, 'yyyy.MM.dd')}">-</span>
                </div>
            </div>
        </div>
    </aside>

</div>

<!-- FOOTER -->
<footer th:replace="~{index :: footer}"></footer>

</body>
</html>
