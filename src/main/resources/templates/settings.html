<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>계정 설정 - CodeEdu</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/tailwind.css">
    <style>
        .settings-container {
            min-height: calc(100vh - 64px - 100px);
            background: var(--bg-section); padding: 40px 5%;
        }
        .settings-wrapper { max-width: 600px; margin: 0 auto; }
        .settings-header {
            text-align: center; margin-bottom: 40px;
        }
        .settings-header h1 {
            font-size: 2.2rem; font-weight: 900; color: var(--accent); margin-bottom: 8px;
        }
        .settings-header p {
            font-size: 1rem; color: var(--ink-2);
        }

        .settings-card {
            background: var(--bg-surface); border-radius: 16px; padding: 32px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06); border: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .settings-card h2 {
            font-size: 1.3rem; font-weight: 800; color: var(--accent);
            margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid var(--accent-soft);
        }

        .form-group { margin-bottom: 24px; }
        .form-group label { 
            display: block; font-size: .85rem; font-weight: 700; 
            color: var(--ink-2); margin-bottom: 10px;
        }
        .form-group input, .form-group textarea {
            width: 100%; padding: 14px 16px; border-radius: 12px; 
            border: 2px solid var(--border-card); font-size: 1rem; 
            transition: border-color .2s; outline: none; font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent-h);
        }

        .form-row { display: flex; gap: 16px; }
        .form-row .form-group { flex: 1; }

        .info-box {
            background: var(--accent-soft); padding: 14px 16px;
            border-radius: 12px; margin-bottom: 20px; font-size: .9rem;
            color: var(--accent); font-weight: 600; border-left: 4px solid var(--accent);
        }

        .btn-submit {
            width: 100%; background: var(--accent); color: var(--bg-surface); border: none;
            padding: 16px; border-radius: 12px; font-size: 1.05rem; font-weight: 800;
            cursor: pointer; transition: transform .15s, background .15s;
            margin-top: 8px;
        }
        .btn-submit:hover { 
            background: var(--accent-h); 
            transform: translateY(-2px); 
        }

        .btn-secondary {
            width: 100%; background: var(--border-card); color: var(--ink-1); border: none;
            padding: 14px; border-radius: 12px; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: transform .15s, background .15s;
            margin-top: 8px;
        }
        .btn-secondary:hover { 
            background: var(--border); 
            transform: translateY(-2px); 
        }

        .success-msg { 
            background: var(--success-soft); color: var(--success); padding: 16px; 
            border-radius: 12px; font-size: .95rem; font-weight: 700; 
            margin-bottom: 20px; border-left: 4px solid var(--success);
        }
        .error-msg { 
            background: var(--danger-soft); color: var(--danger); padding: 16px; 
            border-radius: 12px; font-size: .95rem; font-weight: 700; 
            margin-bottom: 20px; border-left: 4px solid var(--danger);
        }

        .divider { 
            margin: 32px 0; 
            border-top: 2px dashed var(--border-card);
        }

        .current-info {
            background: var(--bg-section); padding: 14px; border-radius: 10px;
            font-size: .9rem; color: var(--ink-2); margin-bottom: 16px;
        }

        .danger-zone {
            background: var(--danger-soft); border: 2px solid var(--danger-soft);
            border-radius: 12px; padding: 24px; margin-top: 32px;
        }
        .danger-zone h2 {
            color: var(--danger); font-size: 1.1rem; margin-bottom: 16px;
        }

        @media (max-width: 640px) {
            .settings-container { padding: 20px; }
            .form-row { flex-direction: column; }
            .settings-header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>


<div class="settings-container">
    <div class="settings-wrapper">
        
        <div class="settings-header">
            <h1>⚙️ 계정 설정</h1>
            <p>프로필 정보를 관리하고 보안을 강화하세요.</p>
        </div>

        <!-- 성공 메시지 -->
        <div th:if="${successMessage}" class="success-msg" th:text="${successMessage}"></div>
        
        <!-- 에러 메시지 -->
        <div th:if="${errorMessage}" class="error-msg" th:text="${errorMessage}"></div>

        <!-- 📋 기본 정보 섹션 -->
        <div class="settings-card reveal">
            <h2>📋 기본 정보</h2>
            
            <div class="current-info">
                <strong>아이디:</strong> <span th:text="${user.username}"></span> 
                <span style="color:var(--ink-3); font-size:.85rem;">(변경 불가)</span>
            </div>

            <!-- 닉네임 변경 -->
            <form action="/settings/nickname" method="POST">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                <div class="form-group">
                    <label for="nickname">닉네임 변경</label>
                    <div class="current-info" style="margin-bottom: 12px;">
                        현재 닉네임: <strong th:text="${user.nickname}"></strong>
                    </div>
                    <input type="text" id="nickname" name="newNickname" 
                           th:value="${user.nickname}"
                           placeholder="새로운 닉네임을 입력하세요" required>
                    <button type="submit" class="btn-submit">닉네임 변경</button>
                </div>
            </form>

            <div class="divider"></div>

            <!-- 이메일 변경 -->
            <form action="/settings/email" method="POST">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                <div class="form-group">
                    <label for="email">이메일 주소 변경</label>
                    <div class="current-info" style="margin-bottom: 12px;">
                        현재 이메일: <strong th:text="${user.email}"></strong>
                    </div>
                    <input type="email" id="email" name="newEmail" 
                           th:value="${user.email}"
                           placeholder="새로운 이메일을 입력하세요" required>
                    <button type="submit" class="btn-submit">이메일 변경</button>
                </div>
            </form>
        </div>

        <!-- 🔐 보안 섹션 -->
        <div class="settings-card reveal">
            <h2>🔐 보안</h2>
            
            <div class="info-box">
                💡 비밀번호를 변경하려면 현재 비밀번호를 먼저 입력해주세요.
            </div>

            <form action="/settings/password" method="POST">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                <div class="form-group">
                    <label for="oldPassword">현재 비밀번호 *</label>
                    <input type="password" id="oldPassword" name="oldPassword" 
                           placeholder="현재 비밀번호를 입력하세요" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="newPassword">새로운 비밀번호 *</label>
                        <input type="password" id="newPassword" name="newPassword" 
                               placeholder="새로운 비밀번호를 입력하세요" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">비밀번호 확인 *</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" 
                               placeholder="비밀번호를 다시 입력하세요" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">비밀번호 변경</button>
            </form>
        </div>

        <!-- 📊 계정 정보 -->
        <div class="settings-card reveal">
            <h2>📊 계정 정보</h2>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="current-info">
                    <strong>가입일:</strong><br>
                    <span th:text="${#temporals.format(user.createdAt, 'yyyy년 MM월 dd일')}"></span>
                </div>
                <div class="current-info">
                    <strong>역할:</strong><br>
                    <span th:text="${user.role == 'ROLE_USER' ? '일반 사용자' : '관리자'}"></span>
                </div>
            </div>
        </div>

        <!-- 위험 영역 -->
        <div class="settings-card danger-zone">
            <h2>⚠️ 위험 영역</h2>
            <p style="color: var(--ink-2); margin-bottom: 16px; font-size: .95rem;">
                아래 작업은 되돌릴 수 없습니다. 신중하게 진행하세요.
            </p>
            <button type="button" class="btn-secondary" onclick="document.getElementById('deleteModal').style.display='flex'">
                🗑️ 계정 삭제
            </button>
        </div>

        <!-- 계정 삭제 확인 모달 -->
        <div id="deleteModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:9999; align-items:center; justify-content:center;">
            <div style="background:var(--bg-surface); border-radius:20px; padding:40px; max-width:420px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,.3);">
                <h3 style="font-size:1.3rem; font-weight:900; color:var(--danger); margin-bottom:12px;">계정을 정말 삭제하시겠습니까?</h3>
                <p style="color:var(--ink-2); font-size:.95rem; margin-bottom:24px; line-height:1.6;">
                    계정을 삭제하면 모든 학습 기록, 퀴즈 결과, 게시글이 영구적으로 삭제되며 <strong>복구할 수 없습니다.</strong>
                </p>
                <form th:action="@{/settings/delete-account}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div style="margin-bottom:20px;">
                        <label style="font-size:.9rem; font-weight:700; color:var(--ink-1); display:block; margin-bottom:8px;">확인을 위해 현재 비밀번호를 입력하세요</label>
                        <input type="password" name="confirmPassword" required
                               style="width:100%; padding:12px 16px; border-radius:10px; border:2px solid var(--border); background:var(--bg-section); font-size:.95rem; color:var(--ink-1); box-sizing:border-box;"
                               placeholder="비밀번호 입력" />
                    </div>
                    <div style="display:flex; gap:12px;">
                        <button type="button" onclick="document.getElementById('deleteModal').style.display='none'"
                                style="flex:1; padding:12px; border-radius:10px; border:2px solid var(--border); background:var(--bg-section); font-weight:700; font-size:.95rem; cursor:pointer; color:var(--ink-1);">
                            취소
                        </button>
                        <button type="submit"
                                style="flex:1; padding:12px; border-radius:10px; border:none; background:var(--danger); color:#fff; font-weight:800; font-size:.95rem; cursor:pointer;">
                            삭제 확인
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 하단 버튼 -->
        <div style="text-align: center; margin-top: 40px; margin-bottom: 40px;">
            <a href="/" class="btn-secondary" style="display: inline-block; width: auto; padding: 14px 32px; text-decoration: none;">
                ← 홈으로 돌아가기
            </a>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer th:replace="~{index :: footer}"></footer>

</body>
</html>
