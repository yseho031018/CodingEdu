<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${langTitle + ' - CodeEdu'}">학습하기 - CodeEdu</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        /* ── 전체 레이아웃 ── */
        .learn-wrap {
            display: flex;
            min-height: calc(100vh - 64px);
        }

        /* ── 사이드바 ── */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: #fff;
            border-right: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 64px;
            height: calc(100vh - 64px);
            overflow-y: auto;
        }
        /* 언어 선택 – 아이콘 그리드 (상단 고정) */
        .sidebar-header {
            padding: 12px 14px 10px;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        .lang-selector-label {
            font-size: .7rem;
            font-weight: 700;
            color: #bbb;
            letter-spacing: .05em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .lang-selector {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        .lang-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 7px 4px;
            border-radius: 10px;
            border: 2px solid transparent;
            background: #f5f5f5;
            cursor: pointer;
            transition: all .15s;
        }
        .lang-btn:hover { background: #E3F2FD; border-color: #90CAF9; }
        .lang-btn.active { background: #E3F2FD; border-color: #1565C0; }
        .lang-btn .lb-icon { font-size: 1.3rem; line-height: 1; }
        .lang-btn .lb-name {
            font-size: .6rem;
            font-weight: 700;
            color: #555;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        .lang-btn.active .lb-name { color: #1565C0; }

        /* 토픽 목록 – 나머지 공간 전부 */
        .sidebar-topics {
            padding: 8px 0;
            flex: 1;
            overflow-y: auto;
        }
        .topics-label {
            font-size: .7rem;
            font-weight: 700;
            color: #bbb;
            padding: 4px 16px 8px;
            letter-spacing: .05em;
            text-transform: uppercase;
        }
        .topic-item {
            display: block;
            padding: 8px 16px;
            font-size: .855rem;
            color: #555;
            text-decoration: none;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all .15s;
            line-height: 1.4;
        }
        .topic-item:hover { background: #f9f9f9; color: #333; }
        .topic-item.active {
            background: #f0f7ff;
            color: #1565C0;
            border-left-color: #1565C0;
            font-weight: 700;
        }
        .topic-item.sub {
            padding-left: 28px;
            font-size: .8rem;
            color: #888;
        }
        .topic-item.sub.active { color: #1565C0; }

        /* ── 메인 콘텐츠 ── */
        .main-content {
            flex: 1;
            padding: 48px 64px;
            background: #fff;
            max-width: 860px;
        }

        .lesson-meta {
            font-size: .85rem;
            color: #1565C0;
            margin-bottom: 6px;
        }
        .lesson-main-title {
            font-size: 2rem;
            font-weight: 900;
            color: #1a1a2e;
            margin-bottom: 12px;
            line-height: 1.3;
        }
        .lesson-date {
            font-size: .82rem;
            color: #aaa;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #eee;
        }
        .lesson-date span { color: #1565C0; margin-left: 8px; }

        /* 동영상 영역 */
        .video-wrap {
            background: #1a1a2e;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 36px;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }
        .video-wrap:hover .play-btn { transform: scale(1.1); }
        .video-thumb-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d3561 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
        }
        .video-thumb-icon { font-size: 4rem; opacity: .4; }
        .video-thumb-title {
            font-size: 1rem;
            color: rgba(255,255,255,.6);
            font-weight: 600;
        }
        .play-btn {
            position: absolute;
            width: 72px;
            height: 72px;
            background: #ff0000;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform .2s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .play-btn::after {
            content: '';
            width: 0;
            height: 0;
            border-top: 14px solid transparent;
            border-bottom: 14px solid transparent;
            border-left: 24px solid #fff;
            margin-left: 4px;
        }
        .yt-label {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(0,0,0,.7);
            color: #fff;
            font-size: .8rem;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
        }

        /* 본문 */
        .lesson-body { font-size: .975rem; color: #333; line-height: 1.9; }
        .lesson-body h3 {
            font-size: 1.25rem;
            font-weight: 800;
            color: #1a1a2e;
            margin: 36px 0 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #eee;
        }
        .lesson-body p { margin-bottom: 16px; }
        .lesson-body ul { padding-left: 20px; margin-bottom: 16px; }
        .lesson-body li { margin-bottom: 8px; }

        .code-block {
            background: #1A1A2E;
            border-radius: 12px;
            padding: 20px 24px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: .875rem;
            color: #69FF47;
            line-height: 1.8;
            overflow-x: auto;
            white-space: pre;
            margin: 16px 0 24px;
        }
        .code-label {
            font-size: .78rem;
            font-weight: 700;
            color: #999;
            margin-bottom: 6px;
            margin-top: 20px;
        }

        .lesson-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 56px;
            padding-top: 28px;
            border-top: 1px solid #eee;
            gap: 12px;
        }
        .nav-btn {
            flex: 1;
            padding: 14px 20px;
            border-radius: 12px;
            border: 2px solid #e8e8e8;
            background: #fff;
            cursor: pointer;
            font-size: .9rem;
            font-weight: 700;
            color: #555;
            transition: all .2s;
            text-align: center;
        }
        .nav-btn:hover { border-color: #1565C0; color: #1565C0; background: #f0f7ff; }
        .nav-btn.next { background: #1565C0; color: #fff; border-color: #1565C0; }
        .nav-btn.next:hover { background: #1E88E5; }
        .nav-btn:disabled { opacity: .35; cursor: not-allowed; }
        .nav-btn:disabled:hover { border-color: #e8e8e8; color: #555; background: #fff; }

        /* ── 모바일 ── */
        .sidebar-toggle {
            display: none;
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #1565C0;
            color: #fff;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(21,101,192,.4);
        }
        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                top: 64px;
                left: -260px;
                z-index: 100;
                transition: left .25s;
                height: calc(100vh - 64px);
            }
            .sidebar.open { left: 0; }
            .sidebar-toggle { display: flex; align-items: center; justify-content: center; }
            .main-content { padding: 32px 24px; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav>
    <a href="/" class="logo">
        <span class="logo-icon">💻</span>
        Code<span>Edu</span>
    </a>
    <div class="nav-links">
        <a href="/learn" style="color: var(--blue-mid); font-weight: 800;">학습하기</a>
        <a href="/quiz">퀴즈</a>
        <a href="/challenge">챌린지</a>
        <a href="/community">커뮤니티</a>
    </div>
    <div class="nav-right" style="display:flex; align-items:center; gap:12px;">
        <div sec:authorize="isAnonymous()">
            <a href="/login" class="btn-login" style="text-decoration:none; display:inline-block;">로그인</a>
            <a href="/register" class="btn-login" style="background:#fff; color:var(--blue); border:2px solid var(--blue); display:inline-block; padding:8px 18px;">회원가입</a>
        </div>
        <div sec:authorize="isAuthenticated()" style="display:flex; align-items:center; gap:12px;">
            <span style="font-weight:700; font-size:.9rem; color:var(--text);"><span sec:authentication="principal.nickname">사용자</span>님 환영해요!</span>
            <form th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="btn-login" style="background:#555;">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="learn-wrap">

    <!-- ── 사이드바 ── -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="lang-selector-label">언어 선택</div>
            <div class="lang-selector" id="langSelector">
                <button class="lang-btn" data-lang="html" onclick="selectLang('html', this)">
                    <span class="lb-icon">🌐</span><span class="lb-name">HTML</span>
                </button>
                <button class="lang-btn" data-lang="css" onclick="selectLang('css', this)">
                    <span class="lb-icon">🎨</span><span class="lb-name">CSS</span>
                </button>
                <button class="lang-btn" data-lang="javascript" onclick="selectLang('javascript', this)">
                    <span class="lb-icon">⚡</span><span class="lb-name">JS</span>
                </button>
                <button class="lang-btn" data-lang="typescript" onclick="selectLang('typescript', this)">
                    <span class="lb-icon">🔷</span><span class="lb-name">TS</span>
                </button>
                <button class="lang-btn" data-lang="java" onclick="selectLang('java', this)">
                    <span class="lb-icon">☕</span><span class="lb-name">Java</span>
                </button>
                <button class="lang-btn" data-lang="kotlin" onclick="selectLang('kotlin', this)">
                    <span class="lb-icon">🌱</span><span class="lb-name">Kotlin</span>
                </button>
                <button class="lang-btn" data-lang="c" onclick="selectLang('c', this)">
                    <span class="lb-icon">🔧</span><span class="lb-name">C</span>
                </button>
                <button class="lang-btn" data-lang="cpp" onclick="selectLang('cpp', this)">
                    <span class="lb-icon">⚙️</span><span class="lb-name">C++</span>
                </button>
                <button class="lang-btn" data-lang="swift" onclick="selectLang('swift', this)">
                    <span class="lb-icon">📱</span><span class="lb-name">Swift</span>
                </button>
                <button class="lang-btn" data-lang="python" onclick="selectLang('python', this)">
                    <span class="lb-icon">🐍</span><span class="lb-name">Python</span>
                </button>
            </div>
        </div>
        <div class="sidebar-topics">
            <div class="topics-label">토픽 목록</div>
            <div id="topicList"></div>
        </div>
    </aside>

    <!-- ── 메인 콘텐츠 ── -->
    <main class="main-content" id="mainContent"></main>

</div>

<!-- 모바일 토글 버튼 -->
<button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

<script>
const COURSES = {
    html: {
        title: "WEB1 - HTML & Internet",
        icon: "🌐",
        date: "2025-01-15",
        lessons: [
            { id: 0, label: "프로젝트의 동기", sub: false,
              title: "이 강의를 만든 이유",
              desc: "코딩을 배우고 싶지만 어디서 시작해야 할지 모르는 분들을 위해 이 강의를 제작했습니다. HTML은 웹의 뼈대를 담당하는 언어로, 가장 쉽게 결과를 눈으로 확인할 수 있어 처음 코딩을 배우기에 최적입니다.",
              points: ["별도 설치 없이 브라우저만 있으면 시작 가능", "작성 즉시 결과 확인 가능", "전 세계 모든 웹사이트의 기반 기술"],
              code: null },
            { id: 1, label: "코딩과 HTML", sub: false,
              title: "코딩이란 무엇인가?",
              desc: "코딩(Coding)이란 컴퓨터에게 명령을 내리는 행위입니다. HTML은 HyperText Markup Language의 약자로, 웹 페이지의 구조와 내용을 정의하는 언어입니다.",
              points: ["HTML은 프로그래밍 언어가 아닌 마크업 언어", "태그(Tag)를 이용해 문서 구조를 표현", "브라우저가 HTML을 읽어 화면에 렌더링"],
              code: '<!-- 이것이 HTML의 기본 구조입니다 -->\n<!DOCTYPE html>\n<html>\n  <head>\n    <title>나의 첫 웹페이지</title>\n  </head>\n  <body>\n    <h1>Hello, World!</h1>\n    <p>HTML로 만든 첫 번째 페이지입니다.</p>\n  </body>\n</html>' },
            { id: 2, label: "HTML 코딩 실습 환경 준비", sub: false,
              title: "개발 환경 설정하기",

              points: ["VS Code 설치 및 기본 설정", "Live Server 확장 설치로 실시간 미리보기", "Chrome 개발자 도구(F12) 활용법"],
              code: null },
            { id: 3, label: "기본 문법 - 태그", sub: false,
              title: "HTML 태그의 기본 문법",
              desc: "HTML은 태그(Tag)라는 단위로 구성됩니다. 대부분의 태그는 열리는 태그와 닫히는 태그가 쌍을 이룹니다.",
              points: ["태그는 꺽쇠 괄호 < > 안에 작성", "대부분 시작 태그와 종료 태그로 구성", "태그 안에 속성(attribute)을 추가 가능"],
              code: '<!-- 기본 태그 사용법 -->\n<h1>제목 1</h1>\n<h2>제목 2</h2>\n<p>단락(paragraph) 태그</p>\n\n<!-- 속성 사용 예시 -->\n<a href="https://www.google.com">구글로 이동</a>\n<img src="photo.jpg" alt="사진 설명">' },
            { id: 4, label: "혁명적인 변화", sub: false,
              title: "웹이 가져온 정보 혁명",

              points: ["하이퍼텍스트: 문서 간 링크로 정보 연결", "누구나 웹페이지를 만들 수 있는 민주화", "WWW(World Wide Web)의 탄생과 발전"],
              code: null },
            { id: 5, label: "HTML이 중요한 이유", sub: false,

            { id: 6, label: "부모 자식과 목록", sub: false,

            { id: 7, label: "HTML 태그의 제왕", sub: false,

            { id: 8, label: "웹사이트 완성", sub: false,

        ]
    },
    css: {

              points: ["HTML이 구조라면 CSS는 디자인", "선택자(Selector)로 스타일 대상 지정", "속성(Property)과 값(Value)으로 스타일 정의"],
              code: '/* CSS 기본 문법 */\n선택자 {\n  속성: 값;\n}\n\n/* 예시 */\nh1 {\n  color: #1565C0;\n  font-size: 2rem;\n  font-weight: 900;\n}' },
            { id: 1, label: "선택자(Selector)", sub: false,

};

// 서버에서 주입된 값
const initialLang       = /*[[${lang}]]*/ 'html';
const completedIndices  = new Set(/*[[${completedIndices}]]*/ []);
const isLoggedIn        = /*[[${completedIndices != null}]]*/ false;
const csrfToken         = document.cookie.match(/XSRF-TOKEN=([^;]+)/)?.[1] || '';

let currentLang = (initialLang && COURSES[initialLang]) ? initialLang : 'html';
let currentLesson = 0;

function selectLang(lang, btn) {
    currentLang = lang;
    currentLesson = 0;
    document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    // URL 업데이트 (history API)
    history.replaceState(null, '', '/learn/' + lang);
    renderTopics();
    renderLesson(0);
    document.getElementById("sidebar").classList.remove("open");
}

function renderTopics() {
    const course = COURSES[currentLang];
    const list = document.getElementById("topicList");
    list.innerHTML = course.lessons.map((l, i) => {
        const done = completedIndices.has(i);
        return `
            <div class="topic-item ${l.sub ? 'sub' : ''} ${i === currentLesson ? 'active' : ''}"
                 onclick="selectLesson(${i})" style="display:flex;justify-content:space-between;align-items:center;">
                <span>${l.label}</span>
                ${done ? '<span style="color:#4CAF50;font-size:.8rem;">✅</span>' : ''}
            </div>
        `;
    }).join("");
    // 진도 표시
    const done = [...Array(course.lessons.length).keys()].filter(i => completedIndices.has(i)).length;
    const total = course.lessons.length;
    document.querySelector('.topics-label').textContent =
        `토픽 목록 (${done}/${total} 완료)`;
}

function renderLesson(idx) {
    const course = COURSES[currentLang];
    const l = course.lessons[idx];
    currentLesson = idx;

    document.querySelectorAll(".topic-item").forEach((el, i) => {
        el.classList.toggle("active", i === idx);
    });

    const codeBlock = l.code ? `
        <div class="code-label">📋 예제 코드</div>
        <div class="code-block">${escHtml(l.code)}</div>
    ` : "";

    const pointsHtml = l.points ? `
        <h3>핵심 포인트</h3>
        <ul>${l.points.map(p => `<li>${p}</li>`).join("")}</ul>
    ` : "";

    document.getElementById("mainContent").innerHTML = `
        <div class="lesson-meta">${course.icon} ${course.title}</div>
        <h1 class="lesson-main-title">${l.title}</h1>
        <div class="lesson-date">
            ${course.date} &nbsp;|&nbsp; <span>공개</span>
        </div>

        <div class="video-wrap" onclick="alert('강의 영상 준비 중입니다!')">
            <div class="video-thumb-bg">
                <div class="video-thumb-icon">${course.icon}</div>
                <div class="video-thumb-title">${course.title} - ${l.label}</div>
            </div>
            <div class="play-btn"></div>
            <div class="yt-label">▶ 강의 영상 보기</div>
        </div>

        <div class="lesson-body">
            <h3>강의 소개</h3>
            <p>${l.desc}</p>
            ${pointsHtml}
            ${codeBlock}
        </div>

        <div class="lesson-nav">
            <button class="nav-btn"
                onclick="selectLesson(${idx - 1})"
                ${idx === 0 ? "disabled" : ""}>
                ← 이전 강의
            </button>
            ${isLoggedIn ? `
            <button class="nav-btn" id="completeBtn"
                onclick="markComplete(${idx})"
                style="flex:none; background:${completedIndices.has(idx) ? '#E8F5E9' : '#f5f5f5'};
                       color:${completedIndices.has(idx) ? '#2E7D32' : '#555'};
                       border-color:${completedIndices.has(idx) ? '#4CAF50' : '#ddd'};">
                ${completedIndices.has(idx) ? '✅ 완료됨' : '☑️ 완료 표시'}
            </button>` : ''}
            <button class="nav-btn next"
                onclick="selectLesson(${idx + 1})"
                ${idx === course.lessons.length - 1 ? "disabled" : ""}>
                다음 강의 →
            </button>
        </div>
    `;

    window.scrollTo({ top: 0, behavior: "smooth" });
}

function selectLesson(idx) {
    const course = COURSES[currentLang];
    if (idx < 0 || idx >= course.lessons.length) return;
    renderLesson(idx);
}

async function markComplete(lessonIdx) {
    try {
        const res = await fetch(`/api/learn/${currentLang}/complete`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-XSRF-TOKEN': getCsrfToken()
            },
            body: JSON.stringify({ lessonIdx })
        });
        if (res.ok) {
            completedIndices.add(lessonIdx);
            renderTopics();
            renderLesson(lessonIdx);
        }
    } catch (e) { console.error(e); }
}

function getCsrfToken() {
    const match = document.cookie.match(/XSRF-TOKEN=([^;]+)/);
    return match ? decodeURIComponent(match[1]) : '';
}

function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// 초기 렌더링 - 서버에서 지정한 언어로 시작
const activeBtn = document.querySelector(`.lang-btn[data-lang="${currentLang}"]`);
if (activeBtn) activeBtn.classList.add("active");
renderTopics();
renderLesson(0);
</script>
</body>
</html>
