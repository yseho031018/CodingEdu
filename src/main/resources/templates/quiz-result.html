<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀴즈 결과 - CodeEdu</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .result-container { max-width: 800px; margin: 40px auto 80px; }

        .score-card {
            background: var(--white); border-radius: 24px; padding: 48px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08); border: 2px solid #eee;
            text-align: center; margin-bottom: 32px;
        }
        .grade-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 100px; height: 100px; border-radius: 50%;
            font-size: 3rem; font-weight: 900; margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .grade-A { background: linear-gradient(135deg, #4CAF50, #2E7D32); color: white; }
        .grade-B { background: linear-gradient(135deg, #2196F3, #1565C0); color: white; }
        .grade-C { background: linear-gradient(135deg, #FF9800, #E65100); color: white; }
        .grade-D { background: linear-gradient(135deg, #FF5722, #BF360C); color: white; }
        .grade-F { background: linear-gradient(135deg, #9E9E9E, #424242); color: white; }

        .quiz-name { font-size: 1rem; color: #888; font-weight: 700; margin-bottom: 12px; }
        .score-main { font-size: 3.5rem; font-weight: 900; color: var(--text); line-height: 1; }
        .score-label { font-size: 1rem; color: #aaa; margin: 8px 0 20px; }
        .score-pct {
            display: inline-block; font-size: 1.8rem; font-weight: 900; color: var(--blue);
            background: var(--blue-light); padding: 8px 28px; border-radius: 50px; margin-bottom: 20px;
        }
        .result-msg { font-size: 1.25rem; font-weight: 800; color: var(--text); }

        .review-section { margin-top: 16px; }
        .review-section h2 { font-size: 1.4rem; font-weight: 900; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px dashed #eee; }

        .q-card {
            background: var(--white); border-radius: 20px; padding: 28px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05); margin-bottom: 16px; border-left: 6px solid #ddd;
        }
        .q-card.correct    { border-left-color: #4CAF50; }
        .q-card.wrong      { border-left-color: #E53935; }
        .q-card.unanswered { border-left-color: #9E9E9E; }

        .q-status { font-size: .85rem; font-weight: 800; margin-bottom: 8px; }
        .q-status.correct    { color: #4CAF50; }
        .q-status.wrong      { color: #E53935; }
        .q-status.unanswered { color: #9E9E9E; }
        .q-text { font-size: 1.05rem; font-weight: 800; color: var(--text); margin-bottom: 16px; line-height: 1.5; }

        .choice-row {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            border-radius: 12px; font-size: .95rem; margin-bottom: 8px;
        }
        .choice-row.correct        { background: #E8F5E9; border: 2px solid #4CAF50; color: #2E7D32; font-weight: 700; }
        .choice-row.wrong-selected { background: #FFEBEE; border: 2px solid #E53935; color: #C62828; font-weight: 700; }
        .choice-row.neutral        { background: #f5f5f5; border: 2px solid #eee; color: #555; }

        .exp-box {
            background: #FFF8E1; border-left: 4px solid #FFA000; border-radius: 8px;
            padding: 14px 18px; font-size: .9rem; color: #555; line-height: 1.6; margin-top: 16px;
        }

        .btn-group-result { display: flex; gap: 16px; justify-content: center; margin-top: 40px; flex-wrap: wrap; }
        .btn-retry {
            background: var(--blue); color: white; padding: 14px 36px;
            border-radius: 50px; font-weight: 800; text-decoration: none;
            box-shadow: 0 4px 12px rgba(21,101,192,0.3); transition: all .2s;
        }
        .btn-retry:hover { background: var(--blue-mid); transform: translateY(-2px); }
        .btn-list {
            background: var(--white); color: var(--blue); padding: 14px 36px;
            border-radius: 50px; font-weight: 800; text-decoration: none;
            border: 2px solid var(--blue); transition: all .2s;
        }
        .btn-list:hover { background: var(--blue-light); }
    </style>
</head>
<body style="background: var(--gray);">

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>


<div class="result-container">

    <!-- 점수 카드 -->
    <div class="score-card">
        <div class="grade-badge" th:classappend="'grade-' + ${quizResult.grade}"
             th:text="${quizResult.grade}">A</div>
        <div class="quiz-name" th:text="${quiz.icon + ' ' + quiz.title}">퀴즈 이름</div>
        <div class="score-main" th:text="${quizResult.score} + ' / ' + ${quizResult.totalQuestions}">4 / 5</div>
        <div class="score-label">정답 / 전체 문제</div>
        <div class="score-pct" th:text="${quizResult.percentage} + '%'">80%</div>
        <div class="result-msg"
             th:text="${quizResult.percentage >= 90 ? '완벽해요! 🎉 마스터 수준입니다!' :
                        quizResult.percentage >= 70 ? '잘 했어요! 👏 조금만 더 연습하면 완벽해요!' :
                        quizResult.percentage >= 50 ? '괜찮아요 💪 다시 도전해서 실력을 키워보세요!' :
                                                      '힘내세요! 😊 아래 해설을 보고 다시 도전해봐요!'}">
            수고했어요!
        </div>

        <!-- 정답/오답/미응답 요약 -->
        <div style="display:flex; justify-content:center; gap:16px; margin-top:28px; flex-wrap:wrap;"
             th:with="correctCnt=${questionViews.?[status=='correct'].size()},
                      wrongCnt=${questionViews.?[status=='wrong'].size()},
                      unansCnt=${questionViews.?[status=='unanswered'].size()}">
            <div style="background:#E8F5E9; border-radius:14px; padding:14px 24px; text-align:center; min-width:90px;">
                <div style="font-size:1.5rem; font-weight:900; color:#2E7D32;" th:text="${correctCnt}">0</div>
                <div style="font-size:.75rem; color:#555; margin-top:2px;">✅ 정답</div>
            </div>
            <div style="background:#FFEBEE; border-radius:14px; padding:14px 24px; text-align:center; min-width:90px;">
                <div style="font-size:1.5rem; font-weight:900; color:#C62828;" th:text="${wrongCnt}">0</div>
                <div style="font-size:.75rem; color:#555; margin-top:2px;">❌ 오답</div>
            </div>
            <div style="background:#F5F5F5; border-radius:14px; padding:14px 24px; text-align:center; min-width:90px;">
                <div style="font-size:1.5rem; font-weight:900; color:#757575;" th:text="${unansCnt}">0</div>
                <div style="font-size:.75rem; color:#555; margin-top:2px;">⬜ 미응답</div>
            </div>
        </div>
    </div>

    <!-- 문제별 해설 -->
    <div class="review-section">
        <h2>📋 문제별 해설</h2>

        <div th:each="qv, stat : ${questionViews}"
             class="q-card" th:classappend="${qv.status}">

            <div class="q-status" th:classappend="${qv.status}"
                 th:text="${qv.status == 'correct' ? '✅ 정답' : qv.status == 'wrong' ? '❌ 오답' : '⬜ 미응답'} + '  Q' + ${stat.count}">
                ✅ Q1
            </div>
            <div class="q-text" th:text="${qv.question.questionText}">문제 내용</div>

            <div th:each="cv : ${qv.choices}" class="choice-row" th:classappend="${cv.status}">
                <span th:text="${cv.status == 'correct' ? '✅' : cv.status == 'wrong-selected' ? '❌' : '○'}">○</span>
                <span th:text="${cv.choice.choiceText}">선택지</span>
            </div>

            <div class="exp-box" th:if="${qv.question.explanation != null}">
                <b>💡 해설:</b> <span th:text="${qv.question.explanation}">해설 내용</span>
            </div>
        </div>
    </div>

    <!-- 버튼 -->
    <div class="btn-group-result">
        <a th:href="@{/quiz/{id}(id=${quiz.id})}" class="btn-retry">🔄 다시 도전하기</a>
        <a href="/quiz" class="btn-list">퀴즈 목록으로</a>
        <a href="/mypage" class="btn-list" style="border-color:#888; color:#555;">📊 내 이력 보기</a>
    </div>
</div>

<!-- FOOTER -->
<footer th:replace="~{index :: footer}"></footer>

</body>
</html>
