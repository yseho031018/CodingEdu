<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티 글쓰기 - CodeEdu</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .write-container {
            max-width: 800px; margin: 60px auto; background: var(--white);
            border-radius: 20px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        .write-header { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px dashed #eaeaea; }
        .write-header h2 { font-size: 1.6rem; font-weight: 900; color: var(--text); }
        .write-header p { font-size: .95rem; color: var(--text-sub); margin-top: 6px; }
        
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: .9rem; font-weight: 800; color: var(--text-sub); margin-bottom: 10px; }
        .form-control {
            width: 100%; padding: 14px 16px; border-radius: 12px; border: 2px solid #eaeaea;
            font-size: 1rem; transition: border-color .2s; outline: none; font-family: inherit;
        }
        .form-control:focus { border-color: var(--blue-mid); }
        select.form-control { appearance: none; background: url('data:image/svg+xml;utf8,<svg fill="black" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>') no-repeat right 12px center; background-size: 20px; }
        textarea.form-control { min-height: 300px; resize: vertical; line-height: 1.6; }
        
        .btn-group { display: flex; gap: 12px; justify-content: flex-end; margin-top: 40px; }
        .btn-cancel {
            background: var(--white); color: var(--text-sub); border: 2px solid #ddd;
            padding: 14px 28px; border-radius: 50px; font-size: 1rem; font-weight: 700;
            cursor: pointer; text-decoration: none; transition: all .2s;
        }
        .btn-cancel:hover { background: #f5f5f5; border-color: #ccc; }
        .btn-submit {
            background: var(--blue); color: var(--white); border: none;
            padding: 14px 32px; border-radius: 50px; font-size: 1rem; font-weight: 800;
            cursor: pointer; transition: transform .15s, background .15s;
            box-shadow: 0 4px 12px rgba(21,101,192,0.3);
        }
        .btn-submit:hover { background: var(--blue-mid); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(21,101,192,0.4); }
    </style>
</head>
<body style="background: var(--gray);">

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>


<div class="write-container">
    <div class="write-header">
        <h2>✏️ 새 글 작성하기</h2>
        <p>에러 질문, 유용한 팁, 스터디 모집 등 자유롭게 글을 남겨주세요!</p>
    </div>

    <form th:action="@{/community/write}" method="POST">
        <!-- 카테고리 선택 -->
        <div class="form-group">
            <label for="category">카테고리</label>
            <select id="category" name="category" class="form-control" required>
                <option value="qna">💡 에러/질문 (Q&A)</option>
                <option value="tips">🔥 꿀팁/노하우</option>
                <option value="study">📚 스터디 모집</option>
                <option value="free">☕ 자유게시판</option>
            </select>
        </div>

        <!-- 제목 입력 -->
        <div class="form-group">
            <label for="title">제목</label>
            <input type="text" id="title" name="title" class="form-control" placeholder="글 제목을 입력해주세요" required autofocus>
        </div>

        <!-- 내용 입력 -->
        <div class="form-group">
            <label for="content">내용</label>
            <textarea id="content" name="content" class="form-control" placeholder="이곳에 알찬 내용을 작성해주세요. (질문할 땐 에러 로그나 코드 조각을 포함해주시면 좋아요!)" required></textarea>
        </div>
        
        <div class="btn-group">
            <a href="/community" class="btn-cancel">취소</a>
            <button type="submit" class="btn-submit">등록하기</button>
        </div>
    </form>
</div>

<!-- FOOTER -->
<footer th:replace="~{index :: footer}"></footer>

</body>
</html>
