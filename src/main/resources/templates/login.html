<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - CodeEdu</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 64px - 100px); /* 헤더, 푸터 제외 높이 */
            display: flex; justify-content: center; align-items: center;
            background: var(--gray); padding: 40px;
        }
        .auth-card {
            background: var(--white); border-radius: 24px; padding: 40px;
            width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            border: 1px solid #eee; text-align: center;
        }
        .auth-card h2 { font-size: 1.8rem; font-weight: 900; color: var(--blue); margin-bottom: 8px; }
        .auth-card p { font-size: .95rem; color: #666; margin-bottom: 30px; }
        
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: .85rem; font-weight: 700; color: var(--text-sub); margin-bottom: 8px; }
        .form-group input {
            width: 100%; padding: 14px 16px; border-radius: 12px; border: 2px solid #eaeaea;
            font-size: 1rem; transition: border-color .2s; outline: none;
        }
        .form-group input:focus { border-color: var(--blue-mid); }
        
        .btn-submit {
            width: 100%; background: var(--blue); color: var(--white); border: none;
            padding: 16px; border-radius: 12px; font-size: 1.05rem; font-weight: 800;
            cursor: pointer; transition: transform .15s, background .15s; margin-top: 10px;
        }
        .btn-submit:hover { background: var(--blue-mid); transform: translateY(-2px); }
        
        .auth-links { margin-top: 24px; font-size: .9rem; color: #666; }
        .auth-links a { color: var(--blue); font-weight: 700; text-decoration: none; margin-left: 6px; }
        .auth-links a:hover { text-decoration: underline; }

        .error-msg { background: #FFEBEE; color: #C62828; padding: 12px; border-radius: 8px; font-size: .85rem; font-weight: 700; margin-bottom: 20px; }
        .success-msg { background: #E8F5E9; color: #2E7D32; padding: 12px; border-radius: 8px; font-size: .85rem; font-weight: 700; margin-bottom: 20px; }
    </style>
</head>
<body>

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>
<div th:replace="~{index :: mobile-menu}"></div>

<div class="auth-container">
    <div class="auth-card">
        <h2>환영합니다! 👋</h2>
        <p>코딩 학습을 이어가기 위해 로그인해주세요.</p>

        <!-- 에러 메시지 렌더링 -->
        <div th:if="${param.error}" class="error-msg">
            아이디 또는 비밀번호가 일치하지 않습니다.
        </div>
        
        <!-- 가입 성공 메시지 렌더링 -->
        <div th:if="${param.registered}" class="success-msg">
            회원가입이 완료되었습니다! 로그인해주세요.
        </div>

        <form action="/login_process" method="POST">
            <!-- CSRF Token -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
            </div>
            
            <button type="submit" class="btn-submit">로그인</button>
        </form>

        <!-- 비밀번호 재설정 성공 메시지 -->
        <div th:if="${param.passwordReset}" class="success-msg">
            비밀번호가 성공적으로 변경되었습니다!
        </div>

        <div class="auth-links">
            아직 계정이 없으신가요? <a href="/register">무료로 회원가입</a>
        </div>
        <div class="auth-links" style="margin-top: 10px;">
            비밀번호를 잊으셨나요? <a href="/forgot-password">비밀번호 찾기</a>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer th:replace="~{index :: footer}"></footer>

</body>
</html>
