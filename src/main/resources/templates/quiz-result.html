<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>퀴즈 결과 - CodeEdu</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/tailwind.css">
    <style>
        .result-container { max-width: 800px; margin: 40px auto 80px; }

        .score-card {
            background: var(--bg-surface); border-radius: 24px; padding: 48px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08); border: 2px solid var(--border);
            text-align: center; margin-bottom: 32px;
        }
        .grade-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 100px; height: 100px; border-radius: 50%;
            font-size: 3rem; font-weight: 900; margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .grade-A { background: linear-gradient(135deg, var(--success), var(--success)); color: white; }
        .grade-B { background: linear-gradient(135deg, var(--accent), var(--accent)); color: white; }
        .grade-C { background: linear-gradient(135deg, var(--amber), var(--warning)); color: white; }
        .grade-D { background: linear-gradient(135deg, var(--warning), var(--danger)); color: white; }
        .grade-F { background: linear-gradient(135deg, var(--ink-3), var(--ink-2)); color: white; }

        .quiz-name { font-size: 1rem; color: var(--ink-3); font-weight: 700; margin-bottom: 12px; }
        .score-main { font-size: 3.5rem; font-weight: 900; color: var(--ink-1); line-height: 1; }
        .score-label { font-size: 1rem; color: var(--ink-3); margin: 8px 0 20px; }
        .score-pct {
            display: inline-block; font-size: 1.8rem; font-weight: 900; color: var(--accent);
            background: var(--accent-soft); padding: 8px 28px; border-radius: 50px; margin-bottom: 20px;
        }
        .result-msg { font-size: 1.25rem; font-weight: 800; color: var(--ink-1); }

        .review-section { margin-top: 16px; }
        .review-section h2 { font-size: 1.4rem; font-weight: 900; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px dashed var(--border); }

        .q-card {
            background: var(--bg-surface); border-radius: 20px; padding: 28px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05); margin-bottom: 16px; border-left: 6px solid var(--border-card);
        }
        .q-card.correct    { border-left-color: var(--success); }
        .q-card.wrong      { border-left-color: var(--danger); }
        .q-card.unanswered { border-left-color: var(--ink-3); }

        .q-status { font-size: .85rem; font-weight: 800; margin-bottom: 8px; }
        .q-status.correct    { color: var(--success); }
        .q-status.wrong      { color: var(--danger); }
        .q-status.unanswered { color: var(--ink-3); }
        .q-text { font-size: 1.05rem; font-weight: 800; color: var(--ink-1); margin-bottom: 16px; line-height: 1.5; }

        .choice-row {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            border-radius: 12px; font-size: .95rem; margin-bottom: 8px;
        }
        .choice-row.correct        { background: var(--success-soft); border: 2px solid var(--success); color: var(--success); font-weight: 700; }
        .choice-row.wrong-selected { background: var(--danger-soft); border: 2px solid var(--danger); color: var(--danger); font-weight: 700; }
        .choice-row.neutral        { background: var(--bg-section); border: 2px solid var(--border); color: var(--ink-2); }

        .exp-box {
            background: var(--amber-soft); border-left: 4px solid var(--amber); border-radius: 8px;
            padding: 14px 18px; font-size: .9rem; color: var(--ink-2); line-height: 1.6; margin-top: 16px;
        }

        .btn-group-result { display: flex; gap: 16px; justify-content: center; margin-top: 40px; flex-wrap: wrap; }
        .btn-retry {
            background: var(--accent); color: white; padding: 14px 36px;
            border-radius: 50px; font-weight: 800; text-decoration: none;
            box-shadow: 0 4px 12px rgba(107,92,231,0.3); transition: all .2s;
        }
        .btn-retry:hover { background: var(--accent-h); transform: translateY(-2px); }
        .btn-list {
            background: var(--bg-surface); color: var(--accent); padding: 14px 36px;
            border-radius: 50px; font-weight: 800; text-decoration: none;
            border: 2px solid var(--accent); transition: all .2s;
        }
        .btn-list:hover { background: var(--accent-soft); }
    </style>
</head>
<body style="background: var(--bg-section);">

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>


<div class="result-container">

    <!-- 점수 카드 -->
    <div class="score-card reveal">
        <div class="grade-badge" th:classappend="'grade-' + ${quizResult.grade}"
             th:text="${quizResult.grade}">A</div>
        <div class="quiz-name" th:text="${quiz.icon + ' ' + quiz.title}">퀴즈 이름</div>
        <div class="score-main" th:text="${quizResult.score} + ' / ' + ${quizResult.totalQuestions}">4 / 5</div>
        <div class="score-label">정답 / 전체 문제</div>
        <div class="score-pct" th:text="${quizResult.percentage} + '%'">80%</div>
        <div class="result-msg"
             th:text="${quizResult.percentage >= 90 ? '완벽해요! 🎉 마스터 수준입니다!' :
                        quizResult.percentage >= 70 ? '잘 했어요! 👏 조금만 더 연습하면 완벽해요!' :
                        quizResult.percentage >= 50 ? '괜찮아요 💪 다시 도전해서 실력을 키워보세요!' :
                                                      '힘내세요! 😊 아래 해설을 보고 다시 도전해봐요!'}">
            수고했어요!
        </div>

        <!-- 정답/오답/미응답 요약 -->
        <div style="display:flex; justify-content:center; gap:16px; margin-top:28px; flex-wrap:wrap;"
             th:with="correctCnt=${questionViews.?[status=='correct'].size()},
                      wrongCnt=${questionViews.?[status=='wrong'].size()},
                      unansCnt=${questionViews.?[status=='unanswered'].size()}">
            <div style="background:var(--success-soft); border-radius:14px; padding:14px 24px; text-align:center; min-width:90px;">
                <div style="font-size:1.5rem; font-weight:900; color:var(--success);" th:text="${correctCnt}">0</div>
                <div style="font-size:.75rem; color:var(--ink-2); margin-top:2px;">✅ 정답</div>
            </div>
            <div style="background:var(--danger-soft); border-radius:14px; padding:14px 24px; text-align:center; min-width:90px;">
                <div style="font-size:1.5rem; font-weight:900; color:var(--danger);" th:text="${wrongCnt}">0</div>
                <div style="font-size:.75rem; color:var(--ink-2); margin-top:2px;">❌ 오답</div>
            </div>
            <div style="background:var(--bg-section); border-radius:14px; padding:14px 24px; text-align:center; min-width:90px;">
                <div style="font-size:1.5rem; font-weight:900; color:var(--ink-3);" th:text="${unansCnt}">0</div>
                <div style="font-size:.75rem; color:var(--ink-2); margin-top:2px;">⬜ 미응답</div>
            </div>
        </div>
    </div>

    <!-- 문제별 해설 -->
    <div class="review-section reveal">
        <h2>📋 문제별 해설</h2>

        <div th:each="qv, stat : ${questionViews}"
             class="q-card" th:classappend="${qv.status}">

            <div class="q-status" th:classappend="${qv.status}"
                 th:text="${qv.status == 'correct' ? '✅ 정답' : qv.status == 'wrong' ? '❌ 오답' : '⬜ 미응답'} + '  Q' + ${stat.count}">
                ✅ Q1
            </div>
            <div class="q-text" th:text="${qv.question.questionText}">문제 내용</div>

            <div th:each="cv : ${qv.choices}" class="choice-row" th:classappend="${cv.status}">
                <span th:text="${cv.status == 'correct' ? '✅' : cv.status == 'wrong-selected' ? '❌' : '○'}">○</span>
                <span th:text="${cv.choice.choiceText}">선택지</span>
            </div>

            <div class="exp-box" th:if="${qv.question.explanation != null}">
                <b>💡 해설:</b> <span th:text="${qv.question.explanation}">해설 내용</span>
            </div>
        </div>
    </div>

    <!-- 버튼 -->
    <div class="btn-group-result">
        <a th:href="@{/quiz/{id}(id=${quiz.id})}" class="btn-retry">🔄 다시 도전하기</a>
        <a href="/quiz" class="btn-list">퀴즈 목록으로</a>
        <a href="/mypage" class="btn-list" style="border-color:var(--ink-3); color:var(--ink-2);">📊 내 이력 보기</a>
    </div>
</div>

<!-- FOOTER -->
<footer th:replace="~{index :: footer}"></footer>

</body>
</html>
