<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>챌린지 - CodeEdu</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .challenge-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .challenge-card {
            background: var(--white); border-radius: 24px; padding: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            transition: transform .2s, box-shadow .2s;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
            border: 2px solid #f0f0f0;
        }
        .challenge-card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,0,0,0.12); border-color: var(--blue-mid); }
        .challenge-card.featured {
            background: linear-gradient(135deg, #FFF9C4 0%, #FFF3E0 100%);
            border: 2px solid var(--yellow-dark);
        }
        .challenge-card.joined { border-color: #4CAF50; }

        .ribbon {
            position: absolute; top: 16px; right: -30px;
            padding: 4px 40px; font-size: .78rem; font-weight: 800;
            transform: rotate(45deg); color: #fff;
        }
        .ribbon.hot { background: #E53935; }
        .ribbon.new { background: var(--blue-mid); }
        .ribbon.joined { background: #4CAF50; }

        .challenge-icon-large { font-size: 3.5rem; margin-bottom: 20px; }
        .challenge-card h3 { font-size: 1.5rem; font-weight: 900; color: var(--text); margin-bottom: 12px; }
        .challenge-card p { font-size: 1rem; color: var(--text-sub); line-height: 1.6; flex-grow: 1; margin-bottom: 24px; }
        .challenge-stats { display: flex; gap: 20px; margin-bottom: 24px; padding-top: 20px; border-top: 1px dashed #ccc; }
        .stat { display: flex; flex-direction: column; }
        .stat-value { font-size: 1.3rem; font-weight: 900; color: var(--blue); }
        .stat-label { font-size: .8rem; color: #777; font-weight: 600; }
        .challenge-progress-bar { background: #eee; border-radius: 10px; height: 8px; margin-bottom: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue-mid), var(--yellow-dark)); border-radius: 10px; }
        .progress-text { display: block; font-size: .85rem; font-weight: 700; color: #555; text-align: right; margin-bottom: 20px; }
        .btn-challenge {
            display: block; width: 100%; text-align: center;
            background: var(--blue); color: var(--white); padding: 14px;
            border-radius: 12px; font-weight: 800; font-size: 1rem; text-decoration: none;
            transition: all .2s; border: none; cursor: pointer;
        }
        .btn-challenge:hover { background: var(--blue-mid); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(21,101,192,0.3); }
        .btn-challenge.joined-btn { background: #4CAF50; }
        .btn-challenge.joined-btn:hover { background: #388E3C; }
        .btn-lock {
            display: block; width: 100%; text-align: center;
            background: #eee; color: #aaa; padding: 14px;
            border-radius: 12px; font-size: 1rem; font-weight: 700;
        }

        .upcoming-challenges { display: flex; flex-direction: column; gap: 20px; margin-top: 40px; }
        .upcoming-card {
            background: var(--white); border-radius: 20px; padding: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 24px;
            transition: transform .2s; border: 1px solid #eee;
        }
        .upcoming-card:hover { transform: translateX(10px); border-color: var(--yellow-dark); }
        .upcoming-date {
            background: var(--gray); border-radius: 16px; padding: 16px; min-width: 90px;
            text-align: center; display: flex; flex-direction: column; border: 2px solid var(--blue-light);
        }
        .upcoming-date .month { font-size: .9rem; font-weight: 700; color: var(--blue); margin-bottom: 4px; }
        .upcoming-date .day { font-size: 1.8rem; font-weight: 900; color: var(--text); }
        .upcoming-info { flex-grow: 1; }
        .upcoming-info h4 { font-size: 1.1rem; font-weight: 800; color: var(--text); margin-bottom: 8px; }
        .upcoming-info p { font-size: .95rem; color: #666; margin-bottom: 8px; }
        .upcoming-duration { font-size: .85rem; font-weight: 700; color: var(--yellow-dark); background: var(--yellow-light); padding: 4px 10px; border-radius: 20px; display: inline-block; }
        .upcoming-ddays { font-size: .82rem; font-weight: 700; color: var(--blue); margin-left: 8px; }
        .btn-detail {
            background: var(--blue-light); color: var(--blue); border: none;
            padding: 10px 24px; border-radius: 50px; font-size: .9rem; font-weight: 700;
            cursor: pointer; transition: all .2s; text-decoration: none; white-space: nowrap;
        }
        .btn-detail:hover { background: var(--blue); color: #fff; }

        @media (max-width: 768px) { .upcoming-card { flex-wrap: wrap; } }
    </style>
</head>
<body>

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>
<div th:replace="~{index :: mobile-menu}"></div>

<!-- PAGE HEADER -->
<header class="page-header" style="background: linear-gradient(135deg, #FFECB3 0%, var(--yellow-light) 100%);">
    <h1 style="color: var(--yellow-dark);">🏆 코딩 챌린지</h1>
    <p style="color: #666;">다양한 코딩 챌린지에 참여하고 포트폴리오를 채워보세요!<br>혼자서는 어려운 미니 프로젝트도 함께하면 재미있습니다 🚀</p>
</header>

<section style="background: var(--gray);">

    <!-- 진행중인 챌린지 -->
    <h2 class="section-title" style="text-align:left;"><span style="font-size:2rem;">🔥</span> 진행중인 챌린지</h2>
    <p class="section-sub" style="text-align:left;">지금 바로 참여하고 나의 코딩 깃허브 잔디를 채워보세요!</p>

    <div class="challenge-grid">
        <div th:each="c : ${activeChallenges}" class="challenge-card"
             th:classappend="${c.featured ? 'featured' : ''} + ' ' + (${joinedIds != null && joinedIds.contains(c.id)} ? 'joined' : '')">

            <!-- 리본 뱃지 -->
            <span th:if="${joinedIds != null && joinedIds.contains(c.id)}"
                  class="ribbon joined">✔ 참여중</span>
            <span th:if="${c.featured && (joinedIds == null || !joinedIds.contains(c.id))}"
                  class="ribbon hot">🔥 인기</span>

            <div class="challenge-icon-large" th:text="${c.icon}">🚀</div>
            <h3 th:text="${c.title}">챌린지명</h3>
            <p th:text="${c.description}">설명</p>

            <div class="challenge-stats">
                <div class="stat">
                    <span class="stat-value" th:text="${participantCounts[c.id]} + '명'">0명</span>
                    <span class="stat-label">참여중</span>
                </div>
                <div class="stat">
                    <span class="stat-value" th:text="${daysLeftMap[c.id]} + '일'">0일</span>
                    <span class="stat-label">남음</span>
                </div>
                <div class="stat">
                    <span class="stat-value" th:text="${c.totalTasks} + '개'">30개</span>
                    <span class="stat-label">총 미션</span>
                </div>
            </div>

            <div class="challenge-progress-bar">
                <div class="progress-fill" th:style="'width:' + ${progressPctMap[c.id]} + '%'"></div>
            </div>
            <span class="progress-text"
                  th:text="${c.progressMessage != null ? c.progressMessage : progressPctMap[c.id] + '% 진행'}">진행 상황</span>

            <!-- 참여 버튼 (로그인 여부에 따라 분기) -->
            <th:block sec:authorize="isAuthenticated()">
                <th:block th:if="${joinedIds != null && joinedIds.contains(c.id)}">
                    <a th:href="@{/challenge/{id}(id=${c.id})}" class="btn-challenge joined-btn">✅ 참여중 · 상세보기</a>
                </th:block>
                <th:block th:unless="${joinedIds != null && joinedIds.contains(c.id)}">
                    <form th:action="@{/challenge/{id}/join(id=${c.id})}" method="post" style="margin:0;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn-challenge">참여하기 🎯</button>
                    </form>
                </th:block>
            </th:block>
            <th:block sec:authorize="isAnonymous()">
                <a href="/login" class="btn-lock">🔒 로그인 후 참여 가능</a>
            </th:block>
        </div>
    </div>

    <!-- 예정된 챌린지 -->
    <h2 class="section-title" style="margin-top:80px; text-align:left;"><span style="font-size:2rem;">📅</span> 오픈 예정 챌린지</h2>
    <p class="section-sub" style="text-align:left;">관심 있는 챌린지를 미리 확인해두세요!</p>

    <div class="upcoming-challenges">
        <div th:each="c : ${upcomingChallenges}" class="upcoming-card">
            <div class="upcoming-date">
                <span class="month" th:text="${#temporals.format(c.startDate, 'M월')}">4월</span>
                <span class="day" th:text="${#temporals.format(c.startDate, 'd')}">15</span>
            </div>
            <div class="upcoming-info">
                <h4 th:text="${c.icon} + ' ' + ${c.title}">챌린지명</h4>
                <p th:text="${c.description}">설명</p>
                <span class="upcoming-duration" th:text="'기간: ' + ${c.totalTasks} + '일 예상'">기간: 14일</span>
                <span class="upcoming-ddays" th:text="'D-' + ${daysLeftMap[c.id]}">D-28</span>
            </div>
            <a th:href="@{/challenge/{id}(id=${c.id})}" class="btn-detail">자세히 보기</a>
        </div>
    </div>

</section>

<!-- FOOTER -->
<footer th:replace="~{index :: footer}"></footer>

</body>
</html>
