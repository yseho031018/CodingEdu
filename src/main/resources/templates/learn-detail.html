<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <meta th:name="_csrf" th:content="${_csrf.token}"/>
    <meta th:name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${langTitle + ' - CodeEdu'}">학습하기 - CodeEdu</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/tailwind.css">
    <style>
        /* ── 전체 레이아웃 ── */
        .learn-wrap {
            display: flex;
            min-height: calc(100vh - 64px);
        }

        /* ── 사이드바 ── */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-card);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 64px;
            height: calc(100vh - 64px);
            overflow-y: auto;
        }
        /* 토픽 목록 – 나머지 공간 전부 */
        .sidebar-topics {
            padding: 8px 0;
            flex: 1;
            overflow-y: auto;
        }
        .topics-label {
            font-size: .7rem;
            font-weight: 700;
            color: var(--ink-3);
            padding: 4px 16px 8px;
            letter-spacing: .05em;
            text-transform: uppercase;
        }
        .topic-item {
            display: block;
            padding: 8px 16px;
            font-size: .855rem;
            color: var(--ink-2);
            text-decoration: none;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all .15s;
            line-height: 1.4;
        }
        .topic-item:hover { background: var(--bg); color: var(--ink-1); }
        .topic-item.active {
            background: var(--accent-soft);
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 700;
        }
        .topic-item.done { color: var(--success); }
        .topic-item.done .topic-label { text-decoration: line-through; opacity: .7; }
        .topic-item.done.active { color: var(--accent); }
        .topic-item.done.active .topic-label { text-decoration: none; opacity: 1; }
        .topic-check {
            width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: .7rem; font-weight: 900;
        }
        .topic-check.checked { background: var(--success); color: #fff; }
        .topic-check.unchecked { display: none; }
        .topic-item.sub {
            padding-left: 28px;
            font-size: .8rem;
            color: var(--ink-3);
        }
        .topic-item.sub.active { color: var(--accent); }

        /* ── 메인 콘텐츠 ── */
        .main-content {
            flex: 1;
            padding: 48px 64px;
            background: var(--bg-surface);
            max-width: 860px;
        }

        .lesson-meta {
            font-size: .85rem;
            color: var(--accent);
            margin-bottom: 6px;
        }
        .lesson-main-title {
            font-size: 2rem;
            font-weight: 900;
            color: var(--ink-1);
            margin-bottom: 12px;
            line-height: 1.3;
        }
        .lesson-date {
            font-size: .82rem;
            color: var(--ink-3);
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }
        .lesson-date span { color: var(--accent); margin-left: 8px; }

        /* 동영상 영역 */
        .video-wrap {
            background: var(--ink-1);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 36px;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .video-thumb-bg {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--ink-1) 0%, var(--accent-h) 100%);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 12px;
        }
        .video-thumb-icon { font-size: 4rem; opacity: .4; }
        .video-thumb-title { font-size: 1rem; color: rgba(255,255,255,.6); font-weight: 600; }

        .play-btn {
            position: absolute;
            width: 72px; height: 72px;
            background: var(--danger); border-radius: 16px; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: transform .2s;
        }
        .play-btn:hover { transform: scale(1.1); }
        .play-btn::after {
            content: ''; width: 0; height: 0;
            border-top: 14px solid transparent;
            border-bottom: 14px solid transparent;
            border-left: 24px solid #fff;
            margin-left: 4px;
        }

        /* 본문 */
        .lesson-body { font-size: .975rem; color: var(--ink-1); line-height: 1.9; }
        .lesson-body h3 {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--ink-1);
            margin: 36px 0 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border);
        }
        .lesson-body p { margin-bottom: 16px; }
        .lesson-body ul { padding-left: 20px; margin-bottom: 16px; }
        .lesson-body li { margin-bottom: 8px; }

        .code-block {
            background: var(--ink-1);
            border-radius: 12px;
            padding: 20px 24px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: .875rem;
            color: #69FF47;
            line-height: 1.8;
            overflow-x: auto;
            white-space: pre;
            margin: 16px 0 24px;
        }
        .code-label {
            font-size: .78rem;
            font-weight: 700;
            color: var(--ink-3);
            margin-bottom: 6px;
            margin-top: 20px;
        }

        .lesson-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 56px;
            padding-top: 28px;
            border-top: 1px solid var(--border);
            gap: 12px;
        }
        .nav-btn {
            flex: 1;
            padding: 14px 20px;
            border-radius: 12px;
            border: 2px solid var(--border-card);
            background: var(--bg-surface);
            cursor: pointer;
            font-size: .9rem;
            font-weight: 700;
            color: var(--ink-2);
            transition: all .2s;
            text-align: center;
        }
        .nav-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
        .nav-btn.next { background: var(--accent); color: #fff; border-color: var(--accent); }
        .nav-btn.next:hover { background: var(--accent-h); }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(107,92,231,.4)} 50%{box-shadow:0 0 0 8px rgba(107,92,231,0)} }
        .nav-btn.pulse { animation: pulse 1.2s infinite; }
        .nav-btn:disabled { opacity: .35; cursor: not-allowed; }
        .nav-btn:disabled:hover { border-color: var(--border-card); color: var(--ink-2); background: var(--bg-surface); }

        /* ── 모바일 ── */
        .sidebar-toggle {
            display: none;
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(107,92,231,.4);
        }
        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                top: 64px;
                left: -260px;
                z-index: 100;
                transition: left .25s;
                height: calc(100vh - 64px);
            }
            .sidebar.open { left: 0; }
            .sidebar-toggle { display: flex; align-items: center; justify-content: center; }
            .main-content { padding: 32px 24px; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>

<div class="learn-wrap">

    <!-- ── 사이드바 ── -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-topics">
            <div class="topics-label">토픽 목록</div>
            <div id="topicList"></div>
        </div>

        <!-- 노트 영역 (로그인 시) -->
        <div th:if="${isLoggedIn}" id="note-panel" style="border-top:1px solid var(--border); padding:12px 16px; flex-shrink:0;">
            <div style="font-size:.75rem; font-weight:700; color:var(--ink-3); margin-bottom:6px; letter-spacing:.05em; text-transform:uppercase;">📝 강의 노트</div>
            <textarea id="note-area"
                      placeholder="이 강의에 대한 메모를 남겨보세요..."
                      style="width:100%; height:110px; border:1.5px solid var(--border-card); border-radius:8px; padding:8px 10px; font-size:.82rem; resize:vertical; font-family:inherit; line-height:1.5; color:var(--ink-1);"></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:6px;">
                <span id="note-status" style="font-size:.72rem; color:var(--ink-3);"></span>
                <button id="note-save-btn" onclick="saveNote()"
                        style="padding:5px 14px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:.78rem; font-weight:700; cursor:pointer;">저장</button>
            </div>
        </div>
    </aside>

    <!-- ── 메인 콘텐츠 ── -->
    <main class="main-content" id="mainContent"></main>

</div>

<!-- 모바일 토글 버튼 -->
<button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

<script th:inline="javascript">
const COURSES = /*[[${coursesPayload}]]*/ {};

// 서버에서 주입된 값
const initialLang      = /*[[${lang}]]*/ 'html';
// completedIndices: 서버가 주입. 비로그인 시 '__GUEST__' 문자열이 들어옴
const _rawIndices      = /*[[${completedIndices != null ? completedIndices : '__GUEST__'}]]*/ '__GUEST__';
const isLoggedIn       = (_rawIndices !== '__GUEST__');
const completedIndices = isLoggedIn ? new Set(_rawIndices) : new Set();
const csrfToken        = document.cookie.match(/XSRF-TOKEN=([^;]+)/)?.[1] || '';
// 서버 주입 노트 맵 { lessonIdx(number): content(string) }
const _rawNoteMap = /*[[${noteMap != null ? noteMap : {}}]]*/ {};
const noteMap = {};
Object.entries(_rawNoteMap).forEach(([k, v]) => { noteMap[Number(k)] = v; });

let currentLang = (initialLang && COURSES[initialLang]) ? initialLang : 'html';
let currentLesson = 0;

function selectLang(lang, btn) {
    currentLang = lang;
    currentLesson = 0;
    document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    // URL 업데이트 (history API)
    history.replaceState(null, '', '/learn/' + lang);
    // 언어 변경 시 noteMap은 서버 재로드 없이 빈 상태로 유지 (페이지 이동으로 갱신)
    Object.keys(noteMap).forEach(k => delete noteMap[k]);
    renderTopics();
    renderLesson(0);
    document.getElementById("sidebar").classList.remove("open");
}

function renderTopics() {
    const course = COURSES[currentLang];
    const list = document.getElementById("topicList");
    list.innerHTML = course.lessons.map((l, i) => {
        const done = completedIndices.has(i);
        const isActive = i === currentLesson;
        return `
            <div class="topic-item ${l.sub ? 'sub' : ''} ${isActive ? 'active' : ''} ${done ? 'done' : ''}"
                 onclick="selectLesson(${i})" style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
                <span class="topic-label">${l.label}</span>
                <span class="topic-check ${done ? 'checked' : 'unchecked'}">✓</span>
            </div>
        `;
    }).join("");
    // 진도 표시
    const done = [...Array(course.lessons.length).keys()].filter(i => completedIndices.has(i)).length;
    const total = course.lessons.length;
    document.querySelector('.topics-label').textContent =
        `토픽 목록 (${done}/${total} 완료)`;
}

function renderLesson(idx) {
    const course = COURSES[currentLang];
    const l = course.lessons[idx];
    currentLesson = idx;

    document.querySelectorAll(".topic-item").forEach((el, i) => {
        el.classList.toggle("active", i === idx);
    });

    const codeBlock = l.code ? `
        <div class="code-label">📋 예제 코드</div>
        <div class="code-block">${escHtml(l.code)}</div>
    ` : "";

    const pointsHtml = l.points ? `
        <h3>핵심 포인트</h3>
        <ul>${l.points.map(p => `<li>${p}</li>`).join("")}</ul>
    ` : "";

    document.getElementById("mainContent").innerHTML = `
        <div class="lesson-meta">${course.icon} ${course.title}</div>
        <h1 class="lesson-main-title">${l.title}</h1>
        <div class="lesson-date">
            ${course.date} &nbsp;|&nbsp; <span>공개</span>
        </div>

        <div class="video-wrap" id="videoWrap">
            <div class="video-thumb-bg" id="videoThumb">
                <div class="video-thumb-icon">${course.icon}</div>
                <div class="video-thumb-title">${course.title} - ${l.label}</div>
            </div>
            <button class="play-btn" onclick="playVideo('${l.videoId || course.videoId}', ${idx})"></button>
        </div>

        <div class="lesson-body">
            <h3>강의 소개</h3>
            <p>${l.desc}</p>
            ${pointsHtml}
            ${codeBlock}
        </div>

        <div class="lesson-nav">
            <button class="nav-btn"
                onclick="selectLesson(${idx - 1})"
                ${idx === 0 ? "disabled" : ""}>
                ← 이전 강의
            </button>
            <button class="nav-btn next" id="nextBtn"
                onclick="completeAndNext(${idx})">
                ${completedIndices.has(idx) ? '다음 강의 →' : '✅ 완료 후 다음 강의 →'}
            </button>
        </div>
    `;

    window.scrollTo({ top: 0, behavior: "smooth" });

    // 노트 패널 로드
    if (isLoggedIn) {
        const noteArea = document.getElementById('note-area');
        const noteStatus = document.getElementById('note-status');
        if (noteArea) {
            noteArea.value = noteMap[idx] || '';
            if (noteStatus) noteStatus.textContent = '';
        }
    }
}

function playVideo(videoId, idx) {
    const wrap = document.getElementById('videoWrap');
    if (!wrap || !videoId) return;
    wrap.innerHTML = `<iframe
        src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0"
        style="position:absolute;inset:0;width:100%;height:100%;border:none;"
        allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
}

function selectLesson(idx) {
    const course = COURSES[currentLang];
    if (idx < 0 || idx >= course.lessons.length) return;
    renderLesson(idx);
}

async function completeAndNext(idx) {
    const course = COURSES[currentLang];
    const btn = document.getElementById('nextBtn');
    if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }

    if (isLoggedIn && !completedIndices.has(idx)) {
        try {
            const csrfToken = document.querySelector('meta[name="_csrf"]')?.content || '';
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN';
            const res = await fetch(`/api/learn/${currentLang}/complete`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfToken },
                body: JSON.stringify({ lessonIdx: idx })
            });
            if (res.ok) {
                completedIndices.add(idx);
                renderTopics();
            }
        } catch (e) { console.error(e); }
    }

    if (idx < course.lessons.length - 1) {
        selectLesson(idx + 1);
    } else {
        showCompleteToast(false, idx);
        if (btn) { btn.disabled = false; btn.textContent = '다음 강의 →'; }
    }
}

function showCompleteToast(hasNext, lessonIdx) {
    const existing = document.getElementById('complete-toast');
    if (existing) existing.remove();

    const toast = document.createElement('div');
    toast.id = 'complete-toast';
    toast.style.cssText = `
        position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
        background:var(--ink-1); color:#fff; border-radius:16px;
        padding:16px 28px; font-weight:700; font-size:.95rem;
        box-shadow:0 8px 24px rgba(0,0,0,0.3); z-index:9999;
        display:flex; align-items:center; gap:14px;
        animation: slideUp .3s ease;
    `;

    if (hasNext) {
        toast.innerHTML = `
            <span>✅ 강의 완료!</span>
            <button onclick="selectLesson(${lessonIdx + 1}); this.closest('#complete-toast').remove();"
                style="background:var(--accent); color:#fff; border:none; border-radius:10px;
                       padding:8px 18px; font-weight:800; cursor:pointer; white-space:nowrap;">
                다음 강의 →
            </button>
            <button onclick="this.closest('#complete-toast').remove();"
                style="background:rgba(255,255,255,0.15); color:#fff; border:none; border-radius:10px;
                       padding:8px 14px; font-weight:700; cursor:pointer;">✕</button>
        `;
    } else {
        toast.innerHTML = `
            <span>🎉 이 언어의 모든 강의를 완료했어요!</span>
            <a href="/learn" style="background:var(--accent); color:#fff; border-radius:10px;
                       padding:8px 18px; font-weight:800; text-decoration:none; white-space:nowrap;">
                학습 목록으로
            </a>
            <button onclick="this.closest('#complete-toast').remove();"
                style="background:rgba(255,255,255,0.15); color:#fff; border:none; border-radius:10px;
                       padding:8px 14px; font-weight:700; cursor:pointer;">✕</button>
        `;
    }

    document.body.appendChild(toast);
    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 6000);
}



async function saveNote() {
    if (!isLoggedIn) return;
    const noteArea = document.getElementById('note-area');
    const noteStatus = document.getElementById('note-status');
    const saveBtn = document.getElementById('note-save-btn');
    if (!noteArea) return;

    const content = noteArea.value;
    const lessonIdx = currentLesson;

    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '저장 중...'; }
    if (noteStatus) noteStatus.textContent = '';

    try {
        const csrfMeta = document.querySelector('meta[name="_csrf"]')?.content || csrfToken;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN';
        const res = await fetch(`/api/learn/${currentLang}/note`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfMeta },
            body: JSON.stringify({ lessonIdx, content })
        });
        if (res.ok) {
            noteMap[lessonIdx] = content;
            if (noteStatus) {
                noteStatus.textContent = '✓ 저장됨';
                noteStatus.style.color = 'var(--success)';
            }
        } else {
            if (noteStatus) { noteStatus.textContent = '저장 실패'; noteStatus.style.color = 'var(--danger)'; }
        }
    } catch (e) {
        if (noteStatus) { noteStatus.textContent = '저장 실패'; noteStatus.style.color = 'var(--danger)'; }
    } finally {
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '저장'; }
        setTimeout(() => { if (noteStatus) noteStatus.textContent = ''; }, 3000);
    }
}

// 노트 textarea blur 시 자동저장 (디바운스)
let _noteDebounce = null;
document.addEventListener('DOMContentLoaded', () => {
    const noteArea = document.getElementById('note-area');
    if (noteArea) {
        noteArea.addEventListener('input', () => {
            clearTimeout(_noteDebounce);
            _noteDebounce = setTimeout(saveNote, 1500);
        });
    }
});

function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// 초기 렌더링 - 서버에서 지정한 언어로 시작
const activeBtn = document.querySelector(`.lang-btn[data-lang="${currentLang}"]`);
if (activeBtn) activeBtn.classList.add("active");
renderTopics();
renderLesson(0);
</script>

</body>
</html>
