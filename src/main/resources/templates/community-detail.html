<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title th:text="${post.title} + ' - CodeEdu'">포스트 제목</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/tailwind.css">
    <style>
        .detail-container {
            max-width: 800px; margin: 40px auto 60px; background: var(--bg-surface);
            border-radius: 20px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }
        .detail-header { border-bottom: 2px dashed var(--border-card); padding-bottom: 20px; margin-bottom: 30px; }
        .post-category {
            display: inline-block; padding: 6px 14px; border-radius: 50px; font-size: .85rem; font-weight: 800; margin-bottom: 12px;
            background: var(--border-card); color: var(--ink-2);
        }
        .post-category.qna { background: var(--accent-soft); color: var(--accent); }
        .post-category.tips { background: var(--amber-soft); color: var(--warning); }
        .post-category.study { background: var(--success-soft); color: var(--success); }
        .post-category.free { background: var(--accent-soft); color: var(--accent); }
        
        .detail-header h2 { font-size: 1.8rem; font-weight: 900; color: var(--ink-1); margin-bottom: 16px; line-height: 1.4; }
        .detail-meta { display: flex; align-items: center; justify-content: space-between; font-size: .95rem; color: var(--ink-2); }
        .meta-left { display: flex; align-items: center; gap: 12px; }
        .meta-author { font-weight: 800; color: var(--ink-1); }
        .meta-right { display: flex; align-items: center; gap: 12px; }
        
        .detail-content { line-height: 1.8; font-size: 1.05rem; color: var(--ink-1); min-height: 300px; white-space: pre-wrap; }
        
        .btn-back-group { margin-top: 40px; display: flex; justify-content: space-between; align-items: center; }
        .btn-back {
            background: var(--accent-soft); color: var(--accent); padding: 12px 30px; border-radius: 50px;
            font-weight: 800; text-decoration: none; transition: all .2s; border: none; cursor: pointer;
        }
        .btn-back:hover { background: var(--accent); color: var(--bg-surface); }
        .post-actions { display: flex; gap: 10px; }
        .btn-edit {
            background: var(--bg-section); color: var(--ink-2); padding: 10px 22px; border-radius: 50px;
            font-weight: 700; text-decoration: none; transition: all .2s; border: 2px solid var(--border-card); font-size: .9rem;
        }
        .btn-edit:hover { background: var(--border-card); border-color: var(--ink-3); }
        .btn-delete {
            background: var(--danger-soft); color: var(--danger); padding: 10px 22px; border-radius: 50px;
            font-weight: 700; border: 2px solid var(--danger-soft); cursor: pointer; font-size: .9rem; transition: all .2s;
        }
        .btn-delete:hover { background: var(--danger); color: white; border-color: var(--danger); }
        .btn-comment-delete {
            background: none; border: none; color: var(--ink-3); font-size: .8rem; cursor: pointer;
            padding: 4px 8px; border-radius: 6px; transition: all .2s;
        }
        .btn-comment-delete:hover { color: var(--danger); background: var(--danger-soft); }

        .reaction-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 24px; }
        .reaction-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 24px; border-radius: 50px; border: 2px solid var(--border);
            background: var(--bg-surface); cursor: pointer; font-size: .95rem; font-weight: 700;
            color: var(--ink-3); transition: all .2s;
        }
        .reaction-btn:hover { transform: translateY(-1px); }
        .reaction-btn .reaction-icon { font-size: 1.1rem; transition: transform .2s; }
        .reaction-btn:hover .reaction-icon, .reaction-btn.active .reaction-icon { transform: scale(1.15); }
        .reaction-btn.like:hover, .reaction-btn.like.active {
            border-color: var(--danger); color: var(--danger); background: var(--danger-soft);
        }
        .reaction-btn.disappointed:hover, .reaction-btn.disappointed.active {
            border-color: var(--warning); color: var(--warning); background: var(--amber-soft);
        }
    </style>
</head>
<body style="background: var(--bg-section);">

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>


<div class="detail-container">
    <div class="detail-header">
        <div class="post-category" 
             th:classappend="${post.category}"
             th:text="${post.category == 'qna' ? '💡 질문' : post.category == 'tips' ? '🔥 꿀팁' : post.category == 'study' ? '📚 스터디' : '☕ 자유'}">카테고리</div>
        <h2 th:text="${post.title}">게시글 제목</h2>
        <div class="detail-meta">
            <div class="meta-left">
                <a class="meta-author" th:href="@{/user/{nick}(nick=${post.author.nickname})}"
                   th:text="${post.author.nickname}" style="text-decoration:none; color:inherit;">작성자</a>
                <span class="meta-date" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</span>
            </div>
            <div class="meta-right">
                <span th:text="'👁️ ' + ${post.views}">조회 0</span>
            </div>
        </div>
    </div>

    <!-- 내용 영역: white-space: pre-wrap 으로 엔터 유지 -->
    <div class="detail-content" th:text="${post.content}">
        게시글 내용
    </div>

    <!-- 반응 버튼 -->
    <div style="margin-top: 30px; padding-top: 24px; border-top: 1px solid var(--border-card);">
        <div class="reaction-group" sec:authorize="isAuthenticated()">
            <button type="button" class="reaction-btn like" th:classappend="${isLiked} ? 'active' : ''"
                    th:data-post-id="${post.id}" data-reaction-type="LIKE">
                <span class="reaction-icon" th:text="${isLiked} ? '❤️' : '🤍'">🤍</span>
                <span id="likeCount" th:text="${post.likeCount}">0</span>
                <span>좋아요</span>
            </button>
            <button type="button" class="reaction-btn disappointed" th:classappend="${isDisappointed} ? 'active' : ''"
                    th:data-post-id="${post.id}" data-reaction-type="DISAPPOINTED">
                <span class="reaction-icon" th:text="${isDisappointed} ? '💛' : '💭'">💭</span>
                <span id="disappointedCount" th:text="${post.disappointedCount}">0</span>
                <span>아쉬워요</span>
            </button>
        </div>
        <div sec:authorize="isAnonymous()" style="display:inline-block; margin-top:12px; color:var(--ink-3); font-size:.9rem;">
            <span>🤍 <strong th:text="${post.likeCount}">0</strong> 좋아요</span>
            <span style="margin-left: 12px;">💭 <strong th:text="${post.disappointedCount}">0</strong> 아쉬워요</span>
        </div>
    </div>

    <!-- 댓글 영역 -->
    <div class="comments-section" style="margin-top: 50px; border-top: 2px solid var(--border-card); padding-top: 30px;">
        <h3 style="font-size: 1.3rem; font-weight: 800; color: var(--ink-1); margin-bottom: 24px;">
            💬 댓글 <span th:text="${commentCount}" style="color: var(--accent);">0</span>개
        </h3>

        <!-- 댓글 목록 -->
        <div class="comment-list" style="margin-bottom: 30px;">
            <div th:each="comment : ${comments}" style="background: var(--bg); padding: 20px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border-card);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span style="font-weight: 800; color: var(--ink-1);" th:text="${comment.author.nickname}">작성자</span>
                        <span style="font-size: .85rem; color: var(--ink-3);" th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</span>
                    </div>
                    <form th:if="${currentUsername != null and currentUsername == comment.author.username}"
                          th:action="@{/community/{postId}/comment/{commentId}/delete(postId=${post.id}, commentId=${comment.id})}"
                          method="POST" style="margin: 0;"
                          onsubmit="return confirm('댓글을 삭제할까요?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn-comment-delete">삭제</button>
                    </form>
                </div>
                <div style="color: var(--ink-1); line-height: 1.5; white-space: pre-wrap; font-size: 0.95rem;" th:text="${comment.content}">댓글 내용</div>
            </div>
            
            <div th:if="${comments.isEmpty()}" style="font-size: .95rem; color: var(--ink-3); text-align: center; padding: 40px 0;">
                아직 작성된 댓글이 없습니다. 첫 번째 댓글을 남겨보세요! ✨
            </div>
        </div>

        <!-- 댓글 작성 폼 -->
        <div sec:authorize="isAuthenticated()" style="background: var(--bg-surface); border: 2px solid var(--border); padding: 24px; border-radius: 16px;">
            <form th:action="@{/community/{id}/comment(id=${post.id})}" method="POST">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <textarea name="content" placeholder="궁금한 점이나 응원의 댓글을 남겨주세요!" required
                          style="width: 100%; min-height: 90px; padding: 16px; border: 1px solid var(--border-card); border-radius: 12px; outline: none; resize: vertical; margin-bottom: 16px; font-family: inherit; font-size: 0.95rem; box-sizing: border-box;"></textarea>
                <div style="display: flex; justify-content: flex-end;">
                    <button type="submit" style="background: var(--accent); color: var(--bg-surface); padding: 12px 28px; border: none; border-radius: 50px; font-weight: 800; cursor: pointer; transition: background .2s;">
                        댓글 등록
                    </button>
                </div>
            </form>
        </div>
        
        <div sec:authorize="isAnonymous()" style="background: var(--bg-section); padding: 30px; border-radius: 16px; text-align: center; color: var(--ink-2); border: 1px dashed var(--border-card);">
            댓글을 작성하려면 <a href="/login" style="color: var(--accent); font-weight: 800; text-decoration: underline;">로그인</a>이 필요합니다.
        </div>
    </div>

    <div class="btn-back-group">
        <a href="/community" class="btn-back">목록으로 돌아가기</a>
        <div class="post-actions" th:if="${currentUsername != null and currentUsername == post.author.username}">
            <a th:href="@{/community/{id}/edit(id=${post.id})}" class="btn-edit">수정</a>
            <form th:action="@{/community/{id}/delete(id=${post.id})}" method="POST" style="margin:0;"
                  onsubmit="return confirm('게시글을 삭제할까요?');">
                <button type="submit" class="btn-delete">삭제</button>
            </form>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer th:replace="~{index :: footer}"></footer>

<script>
    const reactionBtns = document.querySelectorAll('.reaction-btn');
    reactionBtns.forEach((btn) => {
        btn.addEventListener('click', function () {
            const postId = this.dataset.postId;
            const reactionType = this.dataset.reactionType;
            const csrfToken = document.cookie.split(';')
                .map(c => c.trim())
                .find(c => c.startsWith('XSRF-TOKEN='));
            const token = csrfToken ? decodeURIComponent(csrfToken.split('=')[1]) : '';

            fetch(`/community/${postId}/reaction?type=${encodeURIComponent(reactionType)}`, {
                method: 'POST',
                headers: { 'X-XSRF-TOKEN': token }
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) { alert(data.error); return; }
                updateReactionUi(data);
            });
        });
    });

    function updateReactionUi(data) {
        document.getElementById('likeCount').textContent = data.likeCount;
        document.getElementById('disappointedCount').textContent = data.disappointedCount;

        reactionBtns.forEach((btn) => {
            const type = btn.dataset.reactionType;
            const icon = btn.querySelector('.reaction-icon');
            const active = data.active && data.reactionType === type;
            btn.classList.toggle('active', active);
            if (type === 'LIKE') icon.textContent = active ? '❤️' : '🤍';
            if (type === 'DISAPPOINTED') icon.textContent = active ? '💛' : '💭';
        });
    }
</script>
</body>
</html>
