<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기 - CodeEdu</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 64px - 100px);
            display: flex; justify-content: center; align-items: center;
            background: var(--gray); padding: 40px;
        }
        .auth-card {
            background: var(--white); border-radius: 24px; padding: 40px;
            width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            border: 1px solid #eee; text-align: center;
        }
        .auth-card h2 { font-size: 1.8rem; font-weight: 900; color: var(--blue); margin-bottom: 8px; }
        .auth-card p { font-size: .95rem; color: #666; margin-bottom: 30px; }

        .step-indicator {
            display: flex; justify-content: center; align-items: center; gap: 12px;
            margin-bottom: 30px;
        }
        .step {
            width: 36px; height: 36px; border-radius: 50%; font-size: .85rem; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #ddd; color: #aaa; background: var(--white);
        }
        .step.active { background: var(--blue); color: white; border-color: var(--blue); }
        .step.done { background: #4CAF50; color: white; border-color: #4CAF50; }
        .step-line { width: 48px; height: 2px; background: #ddd; }
        .step-line.done { background: #4CAF50; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: .85rem; font-weight: 700; color: var(--text-sub); margin-bottom: 8px; }
        .form-group input {
            width: 100%; padding: 14px 16px; border-radius: 12px; border: 2px solid #eaeaea;
            font-size: 1rem; transition: border-color .2s; outline: none; box-sizing: border-box;
        }
        .form-group input:focus { border-color: var(--blue-mid); }

        .btn-submit {
            width: 100%; background: var(--blue); color: var(--white); border: none;
            padding: 16px; border-radius: 12px; font-size: 1.05rem; font-weight: 800;
            cursor: pointer; transition: transform .15s, background .15s; margin-top: 10px;
        }
        .btn-submit:hover { background: var(--blue-mid); transform: translateY(-2px); }

        .auth-links { margin-top: 24px; font-size: .9rem; color: #666; }
        .auth-links a { color: var(--blue); font-weight: 700; text-decoration: none; margin-left: 6px; }
        .auth-links a:hover { text-decoration: underline; }

        .error-msg { background: #FFEBEE; color: #C62828; padding: 12px; border-radius: 8px; font-size: .85rem; font-weight: 700; margin-bottom: 20px; }
        .hint-text { font-size: .85rem; color: #888; margin-top: 6px; }
    </style>
</head>
<body>

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>
<div th:replace="~{index :: mobile-menu}"></div>

<div class="auth-container">
    <div class="auth-card">

        <!-- ===== 2단계: 새 비밀번호 설정 ===== -->
        <th:block th:if="${resetStep}">
            <h2>새 비밀번호 설정 🔐</h2>
            <p>사용하실 새 비밀번호를 입력해주세요.</p>

            <div class="step-indicator">
                <div class="step done">✓</div>
                <div class="step-line done"></div>
                <div class="step active">2</div>
            </div>

            <div th:if="${resetError}" class="error-msg" th:text="${resetError}"></div>

            <form th:action="@{/forgot-password/reset}" method="POST">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="form-group">
                    <label for="newPassword">새 비밀번호</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="8자 이상 입력하세요" required autofocus>
                    <p class="hint-text">영문, 숫자 포함 8자 이상</p>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">비밀번호 확인</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="비밀번호를 다시 입력하세요" required>
                </div>
                <button type="submit" class="btn-submit">비밀번호 변경하기</button>
            </form>
        </th:block>

        <!-- ===== 1단계: 본인 확인 ===== -->
        <th:block th:unless="${resetStep}">
            <h2>비밀번호 찾기 🔑</h2>
            <p>가입 시 등록한 아이디와 이메일을 입력하면<br>비밀번호를 재설정할 수 있습니다.</p>

            <div class="step-indicator">
                <div class="step active">1</div>
                <div class="step-line"></div>
                <div class="step">2</div>
            </div>

            <div th:if="${verifyError}" class="error-msg" th:text="${verifyError}"></div>

            <form th:action="@{/forgot-password/verify}" method="POST">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" placeholder="가입한 아이디를 입력하세요" required autofocus>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="가입한 이메일을 입력하세요" required>
                </div>
                <button type="submit" class="btn-submit">본인 확인하기</button>
            </form>
        </th:block>

        <div class="auth-links">
            <a href="/login">← 로그인으로 돌아가기</a>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer th:replace="~{index :: footer}"></footer>

</body>
</html>
