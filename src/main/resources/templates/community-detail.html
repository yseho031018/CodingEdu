<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post.title} + ' - CodeEdu'">포스트 제목</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .detail-container {
            max-width: 800px; margin: 40px auto 60px; background: var(--white);
            border-radius: 20px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        .detail-header { border-bottom: 2px dashed #eaeaea; padding-bottom: 20px; margin-bottom: 30px; }
        .post-category {
            display: inline-block; padding: 6px 14px; border-radius: 50px; font-size: .85rem; font-weight: 800; margin-bottom: 12px;
            background: #f0f0f0; color: #555;
        }
        .post-category.qna { background: #E3F2FD; color: #1565C0; }
        .post-category.tips { background: #FFF3E0; color: #E65100; }
        .post-category.study { background: #E8F5E9; color: #2E7D32; }
        .post-category.free { background: #F3E5F5; color: #6A1B9A; }
        
        .detail-header h2 { font-size: 1.8rem; font-weight: 900; color: var(--text); margin-bottom: 16px; line-height: 1.4; }
        .detail-meta { display: flex; align-items: center; justify-content: space-between; font-size: .95rem; color: #666; }
        .meta-left { display: flex; align-items: center; gap: 12px; }
        .meta-author { font-weight: 800; color: var(--text); }
        .meta-right { display: flex; align-items: center; gap: 12px; }
        
        .detail-content { line-height: 1.8; font-size: 1.05rem; color: #333; min-height: 300px; white-space: pre-wrap; }
        
        .btn-back-group { margin-top: 40px; display: flex; justify-content: space-between; align-items: center; }
        .btn-back {
            background: var(--blue-light); color: var(--blue); padding: 12px 30px; border-radius: 50px;
            font-weight: 800; text-decoration: none; transition: all .2s; border: none; cursor: pointer;
        }
        .btn-back:hover { background: var(--blue); color: var(--white); }
        .post-actions { display: flex; gap: 10px; }
        .btn-edit {
            background: #f5f5f5; color: #555; padding: 10px 22px; border-radius: 50px;
            font-weight: 700; text-decoration: none; transition: all .2s; border: 2px solid #ddd; font-size: .9rem;
        }
        .btn-edit:hover { background: #e8e8e8; border-color: #bbb; }
        .btn-delete {
            background: #FFF0F0; color: #c0392b; padding: 10px 22px; border-radius: 50px;
            font-weight: 700; border: 2px solid #f5c6c6; cursor: pointer; font-size: .9rem; transition: all .2s;
        }
        .btn-delete:hover { background: #c0392b; color: white; border-color: #c0392b; }
        .btn-comment-delete {
            background: none; border: none; color: #aaa; font-size: .8rem; cursor: pointer;
            padding: 4px 8px; border-radius: 6px; transition: all .2s;
        }
        .btn-comment-delete:hover { color: #c0392b; background: #FFF0F0; }

        .like-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 24px; border-radius: 50px; border: 2px solid #eee;
            background: #fff; cursor: pointer; font-size: .95rem; font-weight: 700;
            color: #888; transition: all .2s; margin-top: 24px;
        }
        .like-btn:hover { border-color: #e74c3c; color: #e74c3c; background: #fff5f5; }
        .like-btn.liked { border-color: #e74c3c; color: #e74c3c; background: #fff5f5; }
        .like-btn .heart { font-size: 1.1rem; transition: transform .2s; }
        .like-btn:hover .heart, .like-btn.liked .heart { transform: scale(1.2); }
    </style>
</head>
<body style="background: var(--gray);">

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>

<div class="detail-container">
    <div class="detail-header">
        <div class="post-category" 
             th:classappend="${post.category}"
             th:text="${post.category == 'qna' ? '💡 질문' : post.category == 'tips' ? '🔥 꿀팁' : post.category == 'study' ? '📚 스터디' : '☕ 자유'}">카테고리</div>
        <h2 th:text="${post.title}">게시글 제목</h2>
        <div class="detail-meta">
            <div class="meta-left">
                <span class="meta-author" th:text="${post.author.nickname}">작성자</span>
                <span class="meta-date" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</span>
            </div>
            <div class="meta-right">
                <span th:text="'👁️ ' + ${post.views}">조회 0</span>
            </div>
        </div>
    </div>

    <!-- 내용 영역: white-space: pre-wrap 으로 엔터 유지 -->
    <div class="detail-content" th:text="${post.content}">
        게시글 내용
    </div>

    <!-- 좋아요 버튼 -->
    <div style="margin-top: 30px; padding-top: 24px; border-top: 1px solid #f0f0f0;">
        <button id="likeBtn" class="like-btn" th:classappend="${isLiked} ? 'liked' : ''"
                sec:authorize="isAuthenticated()"
                th:data-post-id="${post.id}"
                th:data-liked="${isLiked}">
            <span class="heart" th:text="${isLiked} ? '❤️' : '🤍'">🤍</span>
            <span id="likeCount" th:text="${post.likeCount}">0</span>
            <span>좋아요</span>
        </button>
        <div sec:authorize="isAnonymous()" style="display:inline-block; margin-top:12px; color:#888; font-size:.9rem;">
            <span>🤍 <strong th:text="${post.likeCount}">0</strong> 좋아요</span>
        </div>
    </div>

    <!-- 댓글 영역 -->
    <div class="comments-section" style="margin-top: 50px; border-top: 2px solid #eaeaea; padding-top: 30px;">
        <h3 style="font-size: 1.3rem; font-weight: 800; color: var(--text); margin-bottom: 24px;">
            💬 댓글 <span th:text="${post.commentCount}" style="color: var(--blue);">0</span>개
        </h3>

        <!-- 댓글 목록 -->
        <div class="comment-list" style="margin-bottom: 30px;">
            <div th:each="comment : ${comments}" style="background: #f9f9f9; padding: 20px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #f0f0f0;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span style="font-weight: 800; color: #444;" th:text="${comment.author.nickname}">작성자</span>
                        <span style="font-size: .85rem; color: #888;" th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</span>
                    </div>
                    <form th:if="${currentUsername != null and currentUsername == comment.author.username}"
                          th:action="@{/community/{postId}/comment/{commentId}/delete(postId=${post.id}, commentId=${comment.id})}"
                          method="POST" style="margin: 0;"
                          onsubmit="return confirm('댓글을 삭제할까요?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn-comment-delete">삭제</button>
                    </form>
                </div>
                <div style="color: #333; line-height: 1.5; white-space: pre-wrap; font-size: 0.95rem;" th:text="${comment.content}">댓글 내용</div>
            </div>
            
            <div th:if="${comments.isEmpty()}" style="font-size: .95rem; color: #888; text-align: center; padding: 40px 0;">
                아직 작성된 댓글이 없습니다. 첫 번째 댓글을 남겨보세요! ✨
            </div>
        </div>

        <!-- 댓글 작성 폼 -->
        <div sec:authorize="isAuthenticated()" style="background: var(--white); border: 2px solid #eee; padding: 24px; border-radius: 16px;">
            <form th:action="@{/community/{id}/comment(id=${post.id})}" method="POST">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <textarea name="content" placeholder="궁금한 점이나 응원의 댓글을 남겨주세요!" required
                          style="width: 100%; min-height: 90px; padding: 16px; border: 1px solid #ddd; border-radius: 12px; outline: none; resize: vertical; margin-bottom: 16px; font-family: inherit; font-size: 0.95rem; box-sizing: border-box;"></textarea>
                <div style="display: flex; justify-content: flex-end;">
                    <button type="submit" style="background: var(--blue); color: var(--white); padding: 12px 28px; border: none; border-radius: 50px; font-weight: 800; cursor: pointer; transition: background .2s;">
                        댓글 등록
                    </button>
                </div>
            </form>
        </div>
        
        <div sec:authorize="isAnonymous()" style="background: #f5f5f5; padding: 30px; border-radius: 16px; text-align: center; color: #666; border: 1px dashed #ccc;">
            댓글을 작성하려면 <a href="/login" style="color: var(--blue); font-weight: 800; text-decoration: underline;">로그인</a>이 필요합니다.
        </div>
    </div>

    <div class="btn-back-group">
        <a href="/community" class="btn-back">목록으로 돌아가기</a>
        <div class="post-actions" th:if="${currentUsername != null and currentUsername == post.author.username}">
            <a th:href="@{/community/{id}/edit(id=${post.id})}" class="btn-edit">수정</a>
            <form th:action="@{/community/{id}/delete(id=${post.id})}" method="POST" style="margin:0;"
                  onsubmit="return confirm('게시글을 삭제할까요?');">
                <button type="submit" class="btn-delete">삭제</button>
            </form>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer th:replace="~{index :: footer}"></footer>

<script>
    const likeBtn = document.getElementById('likeBtn');
    if (likeBtn) {
        likeBtn.addEventListener('click', function () {
            const postId = this.dataset.postId;
            const csrfToken = document.cookie.split(';')
                .map(c => c.trim())
                .find(c => c.startsWith('XSRF-TOKEN='));
            const token = csrfToken ? decodeURIComponent(csrfToken.split('=')[1]) : '';

            fetch(`/community/${postId}/like`, {
                method: 'POST',
                headers: { 'X-XSRF-TOKEN': token }
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) { alert(data.error); return; }
                document.getElementById('likeCount').textContent = data.likeCount;
                const heart = likeBtn.querySelector('.heart');
                if (data.liked) {
                    likeBtn.classList.add('liked');
                    heart.textContent = '❤️';
                } else {
                    likeBtn.classList.remove('liked');
                    heart.textContent = '🤍';
                }
            });
        });
    }
</script>
</body>
</html>
