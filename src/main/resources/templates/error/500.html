<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>서버 오류 - CodeEdu</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/tailwind.css">
    <style>
        .error-container {
            min-height: calc(100vh - 64px - 100px);
            display: flex; justify-content: center; align-items: center;
            background: var(--bg-section); padding: 40px; text-align: center;
        }
        .error-card {
            background: var(--bg-surface); border-radius: 24px; padding: 60px 40px;
            max-width: 500px; width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06); border: 1px solid var(--border);
        }
        .error-code {
            font-size: 6rem; font-weight: 900; color: var(--danger);
            line-height: 1; margin-bottom: 16px;
        }
        .error-title {
            font-size: 1.5rem; font-weight: 800; color: var(--ink-1);
            margin-bottom: 12px;
        }
        .error-desc {
            font-size: 1rem; color: var(--ink-2); margin-bottom: 32px;
            line-height: 1.6;
        }
        .btn-home {
            display: inline-block; background: var(--accent); color: var(--bg-surface);
            padding: 14px 32px; border-radius: 12px; font-size: 1rem;
            font-weight: 800; text-decoration: none;
            transition: background .15s, transform .15s;
        }
        .btn-home:hover { background: var(--accent-h); transform: translateY(-2px); }
    </style>
</head>
<body>

<nav th:replace="~{index :: nav}"></nav>

<div class="error-container">
    <div class="error-card">
        <div class="error-code">500</div>
        <div class="error-title">서버 오류가 발생했습니다</div>
        <p class="error-desc">
            일시적인 서버 오류입니다. 잠시 후 다시 시도해주세요.<br>
            문제가 지속되면 관리자에게 문의해주세요.
        </p>
        <a href="/" class="btn-home">홈으로 돌아가기</a>
    </div>
</div>

<footer th:replace="~{index :: footer}"></footer>

</body>
</html>
