# =====================================================
# 이 파일은 예시 파일입니다.
# 실제 값을 채운 뒤 'application.properties' 로 복사해서 사용하세요.
# application.properties 는 .gitignore에 포함되어 Git에 올라가지 않습니다.
# =====================================================

# Server
server.port=8080

# Thymeleaf caching (개발 중 false)
spring.thymeleaf.cache=false

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# DataSource — 실제 값으로 교체하세요
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://YOUR_HOST:4000/YOUR_DB?sslMode=VERIFY_IDENTITY
spring.datasource.username=YOUR_USERNAME
spring.datasource.password=YOUR_PASSWORD

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
