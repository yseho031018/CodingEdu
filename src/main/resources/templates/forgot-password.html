<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기 - CodeEdu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/tailwind.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 68px - 88px);
            display: flex; justify-content: center; align-items: center;
            background: var(--bg-section); padding: 40px 20px;
        }
        .auth-card {
            background: var(--bg-surface);
            border-radius: 26px; padding: 44px 40px;
            width: 100%; max-width: 420px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-card);
        }
        .auth-logo {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-bottom: 28px; text-decoration: none;
        }
        .auth-logo-mark {
            width: 36px; height: 36px; border-radius: 11px;
            background: var(--accent); display: flex; align-items: center;
            justify-content: center; font-size: 1.1rem; color: #fff;
        }
        .auth-logo-name {
            font-size: 1.3rem; font-weight: 800; color: var(--ink-1);
            letter-spacing: -0.025em;
        }
        .auth-title {
            font-size: 1.55rem; font-weight: 800; color: var(--ink-1);
            margin-bottom: 6px; letter-spacing: -0.03em; text-align: center;
        }
        .auth-sub {
            font-size: .88rem; color: var(--ink-2); margin-bottom: 28px;
            text-align: center; line-height: 1.65;
        }

        /* 스텝 인디케이터 */
        .step-indicator {
            display: flex; justify-content: center; align-items: center;
            gap: 10px; margin-bottom: 28px;
        }
        .step {
            width: 34px; height: 34px; border-radius: 50%;
            font-size: .82rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            border: 1.5px solid var(--border-card);
            color: var(--ink-3); background: var(--bg-surface);
            transition: all 0.2s;
        }
        .step.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(107,92,231,0.15); }
        .step.done   { background: var(--success); color: white; border-color: var(--success); }
        .step-line { width: 48px; height: 2px; background: var(--border); border-radius: 2px; }
        .step-line.done { background: var(--success); }

        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; font-size: .82rem; font-weight: 600;
            color: var(--ink-1); margin-bottom: 7px;
        }
        .form-group input {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            border: 1.5px solid var(--border-card);
            background: var(--bg-surface); color: var(--ink-1);
            font-size: .93rem; font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s; outline: none;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(107,92,231,0.14);
        }
        .form-group input::placeholder { color: var(--ink-3); }
        .hint-text { font-size: .78rem; color: var(--ink-3); margin-top: 6px; }

        .btn-submit {
            width: 100%; background: var(--accent); color: #fff; border: none;
            padding: 14px; border-radius: 14px; font-size: .97rem; font-weight: 700;
            cursor: pointer; letter-spacing: -0.01em;
            transition: background 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
            box-shadow: 0 2px 14px rgba(107,92,231,0.28); margin-top: 8px;
        }
        .btn-submit:hover {
            background: var(--accent-h);
            transform: translateY(-2px);
            box-shadow: 0 4px 22px rgba(107,92,231,0.40);
        }
        .auth-links { margin-top: 22px; font-size: .86rem; color: var(--ink-2); text-align: center; }
        .auth-links a { color: var(--accent); font-weight: 600; text-decoration: none; }
        .auth-links a:hover { text-decoration: underline; }
        .error-msg {
            background: var(--danger-soft); color: var(--danger);
            padding: 11px 14px; border-radius: 10px;
            font-size: .84rem; font-weight: 600; margin-bottom: 20px;
            border-left: 3px solid var(--danger);
        }
    </style>
</head>
<body>

<nav th:replace="~{index :: nav}"></nav>

<div class="auth-container">
    <div class="auth-card reveal">

        <a href="/" class="auth-logo reveal">
            <div class="auth-logo-mark">💻</div>
            <span class="auth-logo-name">CodeEdu</span>
        </a>

        <!-- ===== 2단계: 새 비밀번호 설정 ===== -->
        <th:block th:if="${resetStep}">
            <h2 class="auth-title">새 비밀번호 설정</h2>
            <p class="auth-sub">사용하실 새 비밀번호를 입력해주세요.</p>

            <div class="step-indicator">
                <div class="step done">✓</div>
                <div class="step-line done"></div>
                <div class="step active">2</div>
            </div>

            <div th:if="${resetError}" class="error-msg" th:text="${resetError}"></div>

            <form th:action="@{/forgot-password/reset}" method="POST">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="form-group">
                    <label for="newPassword">새 비밀번호</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="8자 이상 입력하세요" required autofocus>
                    <p class="hint-text">영문, 숫자 포함 8자 이상</p>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">비밀번호 확인</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="비밀번호를 다시 입력하세요" required>
                </div>
                <button type="submit" class="btn-submit">비밀번호 변경하기</button>
            </form>
        </th:block>

        <!-- ===== 1단계: 본인 확인 ===== -->
        <th:block th:unless="${resetStep}">
            <h2 class="auth-title">비밀번호 찾기</h2>
            <p class="auth-sub">가입 시 등록한 아이디와 이메일을 입력하면<br>비밀번호를 재설정할 수 있습니다.</p>

            <div class="step-indicator">
                <div class="step active">1</div>
                <div class="step-line"></div>
                <div class="step">2</div>
            </div>

            <div th:if="${verifyError}" class="error-msg" th:text="${verifyError}"></div>

            <form th:action="@{/forgot-password/verify}" method="POST">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" placeholder="가입한 아이디를 입력하세요" required autofocus>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="가입한 이메일을 입력하세요" required>
                </div>
                <button type="submit" class="btn-submit">본인 확인하기</button>
            </form>
        </th:block>

        <div class="auth-links">
            <a href="/login">← 로그인으로 돌아가기</a>
        </div>
    </div>
</div>

<footer th:replace="~{index :: footer}"></footer>

</body>
</html>
