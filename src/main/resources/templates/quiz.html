<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀴즈 - CodeEdu</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .quiz-filter-tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap; }
        .filter-tab {
            padding: 8px 24px; border-radius: 50px; border: 2px solid #eee;
            background: var(--white); font-size: .95rem; font-weight: 700; cursor: pointer;
            transition: all .2s; color: var(--text-sub); text-decoration: none; display: inline-block;
        }
        .filter-tab.active, .filter-tab:hover {
            background: var(--blue); color: var(--white); border-color: var(--blue);
        }
        .quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .quiz-card {
            background: var(--white); border-radius: 24px; padding: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            transition: transform .2s, box-shadow .2s;
            display: flex; flex-direction: column; border: 2px solid transparent;
        }
        .quiz-card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,0,0,0.12); border-color: var(--yellow); }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .quiz-lang { font-weight: 900; font-size: 1.15rem; color: var(--blue); display: flex; align-items: center; gap: 6px; }
        .quiz-difficulty { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; color: white; }
        .difficulty-easy { background: linear-gradient(135deg, #4CAF50, #2E7D32); }
        .difficulty-medium { background: linear-gradient(135deg, #FFA000, #F57C00); }
        .difficulty-hard { background: linear-gradient(135deg, #E53935, #C62828); }
        .quiz-card h3 { font-size: 1.35rem; font-weight: 800; color: var(--text); margin-bottom: 12px; }
        .quiz-card p { font-size: 0.95rem; color: var(--text-sub); line-height: 1.6; flex-grow: 1; margin-bottom: 24px; }
        .quiz-meta { display: flex; gap: 16px; font-size: 0.85rem; color: #666; margin-bottom: 24px; flex-wrap: wrap; }
        .quiz-meta span { display: flex; align-items: center; gap: 4px; }
        .btn-quiz {
            display: inline-block; width: 100%; text-align: center;
            background: var(--blue-light); color: var(--blue); padding: 14px;
            border-radius: 12px; font-weight: 800; font-size: 1rem; text-decoration: none;
            transition: all .2s; border: none; cursor: pointer;
        }
        .btn-quiz:hover { background: var(--blue); color: var(--white); transform: scale(1.02); }
        .login-notice {
            display: inline-block; width: 100%; text-align: center;
            background: #f5f5f5; color: #888; padding: 14px;
            border-radius: 12px; font-weight: 700; font-size: .9rem; text-decoration: none;
            border: 2px dashed #ddd; box-sizing: border-box;
        }
        .login-notice:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }
    </style>
</head>
<body>

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>


<!-- PAGE HEADER -->
<header class="page-header">
    <h1>📝 코딩 퀴즈</h1>
    <p>배운 내용을 퀴즈로 확인하고 실력을 테스트해보세요!<br>틀려도 괜찮아요, 다시 도전하면 되니까요 😊</p>
</header>

<!-- QUIZ SECTION -->
<section style="background: var(--white);">
    <!-- 연습 퀴즈 배너 -->
    <div style="background: linear-gradient(135deg, var(--blue-light), #BBDEFB); border-radius: 20px;
                padding: 28px 36px; display:flex; justify-content:space-between; align-items:center;
                margin-bottom: 40px; flex-wrap: wrap; gap: 16px;">
        <div>
            <div style="font-size:1.2rem; font-weight:900; color:var(--blue); margin-bottom:6px;">⚡ 빠른 연습 퀴즈</div>
            <div style="font-size:.95rem; color:var(--text-sub);">난이도·주제를 직접 골라 즉석에서 풀어보는 연습 모드</div>
        </div>
        <a href="/quiz/practice"
           style="background:var(--blue); color:white; padding:12px 28px; border-radius:50px;
                  font-weight:800; text-decoration:none; font-size:.95rem; white-space:nowrap;
                  transition: background .2s;"
           onmouseover="this.style.background='var(--blue-mid)'"
           onmouseout="this.style.background='var(--blue)'">연습하러 가기 →</a>
    </div>

    <!-- 난이도 필터 탭 -->
    <div class="quiz-filter-tabs">
        <a th:href="@{/quiz(difficulty='all')}" class="filter-tab" th:classappend="${currentDifficulty == 'all'} ? 'active'">전체</a>
        <a th:href="@{/quiz(difficulty='easy')}" class="filter-tab" th:classappend="${currentDifficulty == 'easy'} ? 'active'">🌱 쉬움</a>
        <a th:href="@{/quiz(difficulty='medium')}" class="filter-tab" th:classappend="${currentDifficulty == 'medium'} ? 'active'">🔥 보통</a>
        <a th:href="@{/quiz(difficulty='hard')}" class="filter-tab" th:classappend="${currentDifficulty == 'hard'} ? 'active'">🚀 어려움</a>
    </div>

    <div class="quiz-grid">
        <div th:if="${quizzes.isEmpty()}" style="grid-column: 1/-1; text-align:center; padding:60px; color:#888; background:var(--gray); border-radius:20px;">
            등록된 퀴즈가 없습니다.
        </div>

        <div th:each="quiz : ${quizzes}" class="quiz-card">
            <div class="quiz-header">
                <span class="quiz-lang" th:text="${quiz.icon + ' ' + quiz.topic}">⚡ JavaScript</span>
                <span class="quiz-difficulty"
                      th:classappend="${quiz.difficulty == 'easy'} ? 'difficulty-easy' : (${quiz.difficulty == 'medium'} ? 'difficulty-medium' : 'difficulty-hard')"
                      th:text="${quiz.difficulty == 'easy'} ? '쉬움' : (${quiz.difficulty == 'medium'} ? '보통' : '어려움')">쉬움</span>
            </div>
            <h3 th:text="${quiz.title}">퀴즈 제목</h3>
            <p th:text="${quiz.description}">설명</p>
            <div class="quiz-meta">
                <span th:text="'📋 ' + ${quiz.questionCount} + '문제'">📋 5문제</span>
                <span th:text="'⏱️ ' + ${quiz.timeLimit} + '분'">⏱️ 15분</span>
            </div>
            <!-- 로그인한 경우: 퀴즈 시작 링크 -->
            <a sec:authorize="isAuthenticated()"
               th:href="@{/quiz/{id}(id=${quiz.id})}" class="btn-quiz">퀴즈 시작 ▶</a>
            <!-- 비로그인: 로그인 안내 -->
            <a sec:authorize="isAnonymous()" href="/login" class="login-notice">로그인 후 풀 수 있어요 🔒</a>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer th:replace="~{index :: footer}"></footer>

</body>
</html>
