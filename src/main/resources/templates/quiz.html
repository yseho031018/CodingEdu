<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀴즈 - CodeEdu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/tailwind.css">
    <style>
        /* ══ 공통 칩 스타일 ════════════════════════════════════════ */
        .qf-chip {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 15px; border-radius: 999px; white-space: nowrap;
            font-size: .83rem; font-weight: 500; text-decoration: none;
            color: var(--ink-2); background: var(--bg-section);
            border: 1.5px solid transparent; line-height: 1.4;
            transition: color .15s, background .15s, border-color .15s,
                        box-shadow .15s, transform .15s;
        }
        .qf-chip:hover {
            color: var(--accent); background: var(--accent-soft);
            border-color: rgba(107,92,231,.25); transform: translateY(-1px);
        }
        .qf-chip.active {
            background: var(--accent); color: #fff; font-weight: 600;
            box-shadow: 0 3px 12px rgba(107,92,231,.3);
        }

        /* ══ 버전 1: 카드형 칩 필터 ════════════════════════════════ */
        .qf1 {
            margin-bottom: 36px;
            background: var(--bg-card);
            border: 1.5px solid var(--border-card);
            border-radius: 20px; overflow: hidden;
        }
        .qf1-row { display: flex; align-items: flex-start; gap: 16px; padding: 14px 22px; }
        .qf1-row + .qf1-row { border-top: 1px solid var(--border-card); }
        .qf1-label {
            font-size: .69rem; font-weight: 700; color: var(--ink-3);
            letter-spacing: .08em; text-transform: uppercase;
            white-space: nowrap; padding-top: 7px;
            min-width: 44px; text-align: right; flex-shrink: 0;
        }
        .qf1-chips { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
        .qf1-lang-wrap { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .qf1-lang-chips { display: flex; gap: 6px; flex-wrap: wrap; }
        .qf1-lang-chips.collapsed { max-height: 34px; overflow: hidden; }
        .qf1-more {
            align-self: flex-start; display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 12px; border-radius: 999px;
            border: 1.5px solid var(--border-card);
            background: transparent; font-size: .77rem; font-weight: 600;
            color: var(--ink-3); cursor: pointer; line-height: 1.4;
            transition: border-color .15s, color .15s, background .15s;
        }
        .qf1-more:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

        /* ══ 버전 2: 드롭다운 필터바 ═══════════════════════════════ */
        .qf2 { position: relative; margin-bottom: 36px; }
        .qf2-bar {
            display: flex; align-items: center; gap: 2px; flex-wrap: wrap;
            background: var(--bg-card); border: 1.5px solid var(--border-card);
            border-radius: 16px; padding: 8px 12px; box-shadow: var(--shadow-sm);
        }
        .qf2-bar-icon { font-size: .88rem; padding: 0 6px; color: var(--ink-3); flex-shrink: 0; }
        .qf2-sep { width: 1px; height: 20px; background: var(--border-card); margin: 0 4px; flex-shrink: 0; }
        .qf2-trigger {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 7px 13px; border-radius: 10px;
            border: none; background: transparent; cursor: pointer;
            font-size: .84rem; font-weight: 500; color: var(--ink-2);
            transition: background .15s, color .15s;
        }
        .qf2-trigger:hover, .qf2-trigger.open { background: var(--accent-soft); color: var(--accent); }
        .qf2-trigger.has-filter { color: var(--accent); font-weight: 700; }
        .qf2-badge {
            background: var(--accent); color: #fff;
            font-size: .69rem; font-weight: 700;
            padding: 2px 8px; border-radius: 999px; white-space: nowrap;
        }
        .qf2-arrow { width: 12px; height: 12px; flex-shrink: 0; display: block; transition: transform .2s; }
        .qf2-trigger.open .qf2-arrow { transform: rotate(180deg); }
        .qf2-spacer { flex: 1; min-width: 4px; }
        .qf2-reset {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: .78rem; font-weight: 600; color: var(--ink-3);
            text-decoration: none; padding: 6px 12px; border-radius: 10px;
            border: 1.5px solid var(--border-card); white-space: nowrap;
            transition: color .15s, border-color .15s, background .15s;
        }
        .qf2-reset:hover { color: var(--danger); border-color: var(--danger); background: rgba(239,68,68,.06); }
        .qf2-panel {
            display: none; position: absolute; top: calc(100% + 8px); left: 0; right: 0;
            background: var(--bg-card); border: 1.5px solid var(--border-card);
            border-radius: 18px; padding: 20px 22px;
            box-shadow: 0 16px 56px rgba(0,0,0,.13); z-index: 200;
        }
        .qf2-panel.open { display: block; animation: qfIn .16s ease; }
        @keyframes qfIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
        .qf2-panel-title {
            font-size: .7rem; font-weight: 700; color: var(--ink-3);
            text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px;
        }
        .qf2-panel-chips { display: flex; gap: 6px; flex-wrap: wrap; }

        /* 모바일 */
        @media (max-width: 600px) {
            .qf1-row { flex-direction: column; gap: 8px; }
            .qf1-label { text-align: left; padding-top: 0; }
            .qf2-sep { display: none; }
            .qf2-trigger { flex: 1; justify-content: center; }
            .qf2-panel {
                position: fixed; bottom: 0; left: 0; right: 0; top: auto;
                border-radius: 20px 20px 0 0; border-bottom: none;
                max-height: 65vh; overflow-y: auto;
            }
        }

        /* 연습 퀴즈 배너 */
        .practice-banner {
            background: linear-gradient(135deg, var(--accent-soft) 0%, var(--bg-section) 100%);
            border-radius: 22px; padding: 28px 32px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 40px; gap: 20px; flex-wrap: wrap;
            border: 1.5px solid rgba(107,92,231,0.12);
        }
        .practice-banner-text { }
        .practice-banner-title {
            font-size: 1.1rem; font-weight: 800;
            color: var(--ink-1); letter-spacing: -0.02em;
            margin-bottom: 5px;
        }
        .practice-banner-sub { font-size: .88rem; color: var(--ink-2); }
        .btn-practice {
            background: var(--accent); color: white;
            padding: 11px 26px; border-radius: 50px;
            font-weight: 700; text-decoration: none; font-size: .9rem;
            white-space: nowrap; flex-shrink: 0;
            transition: background 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
            box-shadow: 0 2px 12px rgba(107,92,231,0.25);
        }
        .btn-practice:hover {
            background: var(--accent-h);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(107,92,231,0.38);
        }

        /* 퀴즈 카드 그리드 */
        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 22px;
        }
        .quiz-card {
            background: var(--bg-card);
            border-radius: 22px; padding: 26px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s, border-color 0.2s;
            display: flex; flex-direction: column;
            border: 1.5px solid var(--border-card);
        }
        .quiz-card:hover {
            transform: translateY(-7px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
        }
        .quiz-card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }
        .quiz-lang {
            font-weight: 700; font-size: 1rem;
            color: var(--ink-1); display: flex; align-items: center; gap: 6px;
            letter-spacing: -0.01em;
        }
        .quiz-difficulty {
            padding: 4px 12px; border-radius: 50px;
            font-size: .72rem; font-weight: 700; color: white;
        }
        .difficulty-easy   { background: var(--success); }
        .difficulty-medium { background: var(--warning); }
        .difficulty-hard   { background: var(--danger); }

        .quiz-card h3 {
            font-size: 1.2rem; font-weight: 700;
            color: var(--ink-1); margin-bottom: 10px;
            letter-spacing: -0.02em; line-height: 1.35;
        }
        .quiz-card p {
            font-size: .88rem; color: var(--ink-2);
            line-height: 1.65; flex-grow: 1; margin-bottom: 20px;
        }
        .quiz-meta {
            display: flex; gap: 14px; font-size: .8rem;
            color: var(--ink-3); margin-bottom: 20px;
            flex-wrap: wrap; font-weight: 500;
        }
        .quiz-meta span { display: flex; align-items: center; gap: 4px; }

        /* 시작/잠금 버튼 */
        .btn-quiz {
            display: block; width: 100%; text-align: center;
            background: var(--accent-soft); color: var(--accent);
            padding: 13px; border-radius: 14px;
            font-weight: 700; font-size: .9rem; text-decoration: none;
            transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
            border: none; cursor: pointer;
        }
        .btn-quiz:hover {
            background: var(--accent); color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(107,92,231,0.28);
        }
        .login-notice {
            display: block; width: 100%; text-align: center;
            background: var(--bg-section); color: var(--ink-3);
            padding: 13px; border-radius: 14px;
            font-weight: 600; font-size: .88rem; text-decoration: none;
            border: 1.5px dashed var(--border-card);
            transition: all 0.2s;
        }
        .login-notice:hover {
            background: var(--accent-soft); color: var(--accent);
            border-color: var(--accent);
        }

        /* 빈 상태 */
        .empty-state {
            grid-column: 1/-1; text-align: center;
            padding: 72px 20px; color: var(--ink-3);
            background: var(--bg-section); border-radius: 22px;
            font-size: .95rem; font-weight: 500;
            border: 1.5px dashed var(--border-card);
        }
        .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 16px; }
    </style>
</head>
<body>

<nav th:replace="~{index :: nav}"></nav>

<header class="page-header reveal">
    <h1>코딩 퀴즈</h1>
    <p>배운 내용을 퀴즈로 확인하고 실력을 테스트해보세요</p>
</header>

<section style="background: var(--bg-surface);">

    <!-- 연습 퀴즈 배너 -->
    <div class="practice-banner reveal">
        <div class="practice-banner-text">
            <div class="practice-banner-title">⚡ 빠른 연습 퀴즈</div>
            <div class="practice-banner-sub">난이도·주제를 직접 골라 즉석에서 풀어보는 연습 모드</div>
        </div>
        <a href="/quiz/practice" class="btn-practice">연습하러 가기 →</a>
    </div>

    <!-- ★ 버전 1: 카드형 칩 필터 ━ 기본 사용 중 (th:if="false"로 비활성화) ★ -->
    <div th:if="true" class="qf1">
        <div class="qf1-row">
            <span class="qf1-label">난이도</span>
            <div class="qf1-chips">
                <a th:href="@{/quiz(difficulty='all',   topic=${currentTopic})}" class="qf-chip" th:classappend="${currentDifficulty=='all'}    ? ' active'">전체</a>
                <a th:href="@{/quiz(difficulty='easy',  topic=${currentTopic})}" class="qf-chip" th:classappend="${currentDifficulty=='easy'}   ? ' active'">🌱 쉬움</a>
                <a th:href="@{/quiz(difficulty='medium',topic=${currentTopic})}" class="qf-chip" th:classappend="${currentDifficulty=='medium'} ? ' active'">🔥 보통</a>
                <a th:href="@{/quiz(difficulty='hard',  topic=${currentTopic})}" class="qf-chip" th:classappend="${currentDifficulty=='hard'}   ? ' active'">🚀 어려움</a>
            </div>
        </div>
        <div class="qf1-row">
            <span class="qf1-label">언어</span>
            <div class="qf1-lang-wrap">
                <div class="qf1-lang-chips" id="qf1-lang">
                    <a th:href="@{/quiz(difficulty=${currentDifficulty},topic='all')}" class="qf-chip" th:classappend="${currentTopic=='all'} ? ' active'">전체</a>
                    <a th:each="t : ${topics}"
                       th:href="@{/quiz(difficulty=${currentDifficulty},topic=${t.topic})}"
                       class="qf-chip"
                       th:classappend="${currentTopic==t.topic} ? ' active'"
                       th:text="${t.icon + ' ' + t.topic}">⚡ JavaScript</a>
                </div>
                <button class="qf1-more" id="qf1-more" hidden onclick="qf1Toggle(this)">더보기</button>
            </div>
        </div>
    </div>

    <!-- ★ 버전 2: 드롭다운 필터바 ━ th:if="true"로 변경하면 활성화 ★ -->
    <div th:if="false" class="qf2" id="qf2">
        <div class="qf2-bar">
            <span class="qf2-bar-icon">⚙️</span>
            <div class="qf2-sep"></div>
            <button class="qf2-trigger"
                    th:classappend="${currentDifficulty != 'all'} ? ' has-filter'"
                    data-panel="qf2-diff" onclick="qf2Open(this)">
                <span>난이도</span>
                <span class="qf2-badge" th:if="${currentDifficulty != 'all'}"
                      th:text="${currentDifficulty=='easy'} ? '🌱 쉬움' : (${currentDifficulty=='medium'} ? '🔥 보통' : '🚀 어려움')"></span>
                <svg class="qf2-arrow" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
            </button>
            <div class="qf2-sep"></div>
            <button class="qf2-trigger"
                    th:classappend="${currentTopic != 'all'} ? ' has-filter'"
                    data-panel="qf2-lang" onclick="qf2Open(this)">
                <span>언어</span>
                <span class="qf2-badge" th:if="${currentTopic != 'all'}" th:text="${currentTopic}"></span>
                <svg class="qf2-arrow" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
            </button>
            <div class="qf2-spacer"></div>
            <a th:if="${currentDifficulty != 'all' || currentTopic != 'all'}"
               th:href="@{/quiz}" class="qf2-reset">✕ 초기화</a>
        </div>
        <div class="qf2-panel" id="qf2-diff">
            <div class="qf2-panel-title">난이도 선택</div>
            <div class="qf2-panel-chips">
                <a th:href="@{/quiz(difficulty='all',   topic=${currentTopic})}" class="qf-chip" th:classappend="${currentDifficulty=='all'}    ? ' active'">전체</a>
                <a th:href="@{/quiz(difficulty='easy',  topic=${currentTopic})}" class="qf-chip" th:classappend="${currentDifficulty=='easy'}   ? ' active'">🌱 쉬움</a>
                <a th:href="@{/quiz(difficulty='medium',topic=${currentTopic})}" class="qf-chip" th:classappend="${currentDifficulty=='medium'} ? ' active'">🔥 보통</a>
                <a th:href="@{/quiz(difficulty='hard',  topic=${currentTopic})}" class="qf-chip" th:classappend="${currentDifficulty=='hard'}   ? ' active'">🚀 어려움</a>
            </div>
        </div>
        <div class="qf2-panel" id="qf2-lang">
            <div class="qf2-panel-title">언어 / 주제 선택</div>
            <div class="qf2-panel-chips">
                <a th:href="@{/quiz(difficulty=${currentDifficulty},topic='all')}" class="qf-chip" th:classappend="${currentTopic=='all'} ? ' active'">전체</a>
                <a th:each="t : ${topics}"
                   th:href="@{/quiz(difficulty=${currentDifficulty},topic=${t.topic})}"
                   class="qf-chip"
                   th:classappend="${currentTopic==t.topic} ? ' active'"
                   th:text="${t.icon + ' ' + t.topic}">⚡ JavaScript</a>
            </div>
        </div>
    </div>

    <!-- 퀴즈 카드 -->
    <div class="quiz-grid reveal">
        <div th:if="${quizzes.isEmpty()}" class="empty-state">
            <span class="empty-icon">📭</span>
            등록된 퀴즈가 없습니다.
        </div>

        <div th:each="quiz : ${quizzes}" class="quiz-card">
            <div class="quiz-card-header">
                <span class="quiz-lang" th:text="${quiz.icon + ' ' + quiz.topic}">⚡ JavaScript</span>
                <span class="quiz-difficulty"
                      th:classappend="${quiz.difficulty == 'easy'} ? 'difficulty-easy' : (${quiz.difficulty == 'medium'} ? 'difficulty-medium' : 'difficulty-hard')"
                      th:text="${quiz.difficulty == 'easy'} ? '쉬움' : (${quiz.difficulty == 'medium'} ? '보통' : '어려움')">쉬움</span>
            </div>
            <h3 th:text="${quiz.title}">퀴즈 제목</h3>
            <p th:text="${quiz.description}">설명</p>
            <div class="quiz-meta">
                <span th:text="'📋 ' + ${quiz.questionCount} + '문제'">📋 5문제</span>
                <span th:text="'⏱ ' + ${quiz.timeLimit} + '분'">⏱ 15분</span>
            </div>
            <a sec:authorize="isAuthenticated()"
               th:href="@{/quiz/{id}(id=${quiz.id})}" class="btn-quiz">퀴즈 시작 →</a>
            <a sec:authorize="isAnonymous()" href="/login" class="login-notice">로그인 후 풀 수 있어요 🔒</a>
        </div>
    </div>
</section>

<footer th:replace="~{index :: footer}"></footer>

<script>
/* ── 버전 1: 언어 칩 접기/펼치기 ─────────────────────────────── */
(function () {
    var lang = document.getElementById('qf1-lang');
    var btn  = document.getElementById('qf1-more');
    if (!lang || !btn) return;

    lang.classList.add('collapsed');

    requestAnimationFrame(function () {
        /* 한 줄 이내면 버튼 숨김 */
        if (lang.scrollHeight <= lang.clientHeight + 2) {
            lang.classList.remove('collapsed');
            return;
        }
        /* 숨겨진 칩 개수 */
        var topY   = lang.getBoundingClientRect().top;
        var chips  = lang.querySelectorAll('a');
        var hidden = 0;
        chips.forEach(function (c) {
            if (c.getBoundingClientRect().top > topY + 34) hidden++;
        });
        btn.removeAttribute('hidden');
        btn.textContent = '+' + hidden + ' 더보기';

        /* 선택된 칩이 접힌 영역에 있으면 자동 펼치기 */
        var active = lang.querySelector('a.active');
        if (active && active.getBoundingClientRect().top > topY + 34) {
            lang.classList.remove('collapsed');
            btn.textContent = '접기 ↑';
        }
    });
}());

function qf1Toggle(btn) {
    var lang      = document.getElementById('qf1-lang');
    var collapsed = lang.classList.toggle('collapsed');
    if (collapsed) {
        requestAnimationFrame(function () {
            var topY   = lang.getBoundingClientRect().top;
            var hidden = 0;
            lang.querySelectorAll('a').forEach(function (c) {
                if (c.getBoundingClientRect().top > topY + 34) hidden++;
            });
            btn.textContent = '+' + hidden + ' 더보기';
        });
    } else {
        btn.textContent = '접기 ↑';
    }
}

/* ── 버전 2: 드롭다운 패널 ───────────────────────────────────── */
function qf2Open(trigger) {
    var panelId = trigger.getAttribute('data-panel');
    var panel   = document.getElementById(panelId);
    if (!panel) return;
    var isOpen  = panel.classList.contains('open');

    document.querySelectorAll('.qf2-panel').forEach(function (p) { p.classList.remove('open'); });
    document.querySelectorAll('.qf2-trigger').forEach(function (t) { t.classList.remove('open'); });

    if (!isOpen) { panel.classList.add('open'); trigger.classList.add('open'); }
}

document.addEventListener('click', function (e) {
    if (!e.target.closest('#qf2')) {
        document.querySelectorAll('.qf2-panel').forEach(function (p) { p.classList.remove('open'); });
        document.querySelectorAll('.qf2-trigger').forEach(function (t) { t.classList.remove('open'); });
    }
});
</script>
</body>
</html>
