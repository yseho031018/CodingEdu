<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계정 설정 - CodeEdu</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .settings-container {
            min-height: calc(100vh - 64px - 100px);
            background: var(--gray); padding: 40px 5%;
        }
        .settings-wrapper { max-width: 600px; margin: 0 auto; }
        .settings-header {
            text-align: center; margin-bottom: 40px;
        }
        .settings-header h1 {
            font-size: 2.2rem; font-weight: 900; color: var(--blue); margin-bottom: 8px;
        }
        .settings-header p {
            font-size: 1rem; color: var(--text-sub);
        }

        .settings-card {
            background: var(--white); border-radius: 16px; padding: 32px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06); border: 1px solid #eee;
            margin-bottom: 24px;
        }
        .settings-card h2 {
            font-size: 1.3rem; font-weight: 800; color: var(--blue);
            margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid var(--blue-light);
        }

        .form-group { margin-bottom: 24px; }
        .form-group label { 
            display: block; font-size: .85rem; font-weight: 700; 
            color: var(--text-sub); margin-bottom: 10px;
        }
        .form-group input, .form-group textarea {
            width: 100%; padding: 14px 16px; border-radius: 12px; 
            border: 2px solid #eaeaea; font-size: 1rem; 
            transition: border-color .2s; outline: none; font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--blue-mid);
        }

        .form-row { display: flex; gap: 16px; }
        .form-row .form-group { flex: 1; }

        .info-box {
            background: var(--blue-light); padding: 14px 16px;
            border-radius: 12px; margin-bottom: 20px; font-size: .9rem;
            color: var(--blue); font-weight: 600; border-left: 4px solid var(--blue);
        }

        .btn-submit {
            width: 100%; background: var(--blue); color: var(--white); border: none;
            padding: 16px; border-radius: 12px; font-size: 1.05rem; font-weight: 800;
            cursor: pointer; transition: transform .15s, background .15s;
            margin-top: 8px;
        }
        .btn-submit:hover { 
            background: var(--blue-mid); 
            transform: translateY(-2px); 
        }

        .btn-secondary {
            width: 100%; background: #f0f0f0; color: var(--text); border: none;
            padding: 14px; border-radius: 12px; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: transform .15s, background .15s;
            margin-top: 8px;
        }
        .btn-secondary:hover { 
            background: #e0e0e0; 
            transform: translateY(-2px); 
        }

        .success-msg { 
            background: #E8F5E9; color: #2E7D32; padding: 16px; 
            border-radius: 12px; font-size: .95rem; font-weight: 700; 
            margin-bottom: 20px; border-left: 4px solid #4CAF50;
        }
        .error-msg { 
            background: #FFEBEE; color: #C62828; padding: 16px; 
            border-radius: 12px; font-size: .95rem; font-weight: 700; 
            margin-bottom: 20px; border-left: 4px solid #f44336;
        }

        .divider { 
            margin: 32px 0; 
            border-top: 2px dashed #ddd;
        }

        .current-info {
            background: #F5F5F5; padding: 14px; border-radius: 10px;
            font-size: .9rem; color: var(--text-sub); margin-bottom: 16px;
        }

        .danger-zone {
            background: #FFEBEE; border: 2px solid #ffcdd2;
            border-radius: 12px; padding: 24px; margin-top: 32px;
        }
        .danger-zone h2 {
            color: #C62828; font-size: 1.1rem; margin-bottom: 16px;
        }

        @media (max-width: 640px) {
            .settings-container { padding: 20px; }
            .form-row { flex-direction: column; }
            .settings-header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>

<div class="settings-container">
    <div class="settings-wrapper">
        
        <div class="settings-header">
            <h1>⚙️ 계정 설정</h1>
            <p>프로필 정보를 관리하고 보안을 강화하세요.</p>
        </div>

        <!-- 성공 메시지 -->
        <div th:if="${successMessage}" class="success-msg" th:text="${successMessage}"></div>
        
        <!-- 에러 메시지 -->
        <div th:if="${errorMessage}" class="error-msg" th:text="${errorMessage}"></div>

        <!-- 📋 기본 정보 섹션 -->
        <div class="settings-card">
            <h2>📋 기본 정보</h2>
            
            <div class="current-info">
                <strong>아이디:</strong> <span th:text="${user.username}"></span> 
                <span style="color:#888; font-size:.85rem;">(변경 불가)</span>
            </div>

            <!-- 닉네임 변경 -->
            <form action="/settings/nickname" method="POST">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                <div class="form-group">
                    <label for="nickname">닉네임 변경</label>
                    <div class="current-info" style="margin-bottom: 12px;">
                        현재 닉네임: <strong th:text="${user.nickname}"></strong>
                    </div>
                    <input type="text" id="nickname" name="newNickname" 
                           th:value="${user.nickname}"
                           placeholder="새로운 닉네임을 입력하세요" required>
                    <button type="submit" class="btn-submit">닉네임 변경</button>
                </div>
            </form>

            <div class="divider"></div>

            <!-- 이메일 변경 -->
            <form action="/settings/email" method="POST">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                <div class="form-group">
                    <label for="email">이메일 주소 변경</label>
                    <div class="current-info" style="margin-bottom: 12px;">
                        현재 이메일: <strong th:text="${user.email}"></strong>
                    </div>
                    <input type="email" id="email" name="newEmail" 
                           th:value="${user.email}"
                           placeholder="새로운 이메일을 입력하세요" required>
                    <button type="submit" class="btn-submit">이메일 변경</button>
                </div>
            </form>
        </div>

        <!-- 🔐 보안 섹션 -->
        <div class="settings-card">
            <h2>🔐 보안</h2>
            
            <div class="info-box">
                💡 비밀번호를 변경하려면 현재 비밀번호를 먼저 입력해주세요.
            </div>

            <form action="/settings/password" method="POST">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                <div class="form-group">
                    <label for="oldPassword">현재 비밀번호 *</label>
                    <input type="password" id="oldPassword" name="oldPassword" 
                           placeholder="현재 비밀번호를 입력하세요" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="newPassword">새로운 비밀번호 *</label>
                        <input type="password" id="newPassword" name="newPassword" 
                               placeholder="새로운 비밀번호를 입력하세요" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">비밀번호 확인 *</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" 
                               placeholder="비밀번호를 다시 입력하세요" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">비밀번호 변경</button>
            </form>
        </div>

        <!-- 📊 계정 정보 -->
        <div class="settings-card">
            <h2>📊 계정 정보</h2>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="current-info">
                    <strong>가입일:</strong><br>
                    <span th:text="${#temporals.format(user.createdAt, 'yyyy년 MM월 dd일')}"></span>
                </div>
                <div class="current-info">
                    <strong>역할:</strong><br>
                    <span th:text="${user.role == 'ROLE_USER' ? '일반 사용자' : '관리자'}"></span>
                </div>
            </div>
        </div>

        <!-- 위험 영역 -->
        <div class="settings-card danger-zone">
            <h2>⚠️ 위험 영역</h2>
            <p style="color: #666; margin-bottom: 16px; font-size: .95rem;">
                아래 작업은 되돌릴 수 없습니다. 신중하게 진행하세요.
            </p>
            <button type="button" class="btn-secondary" onclick="alert('계정 삭제 기능은 추후 업데이트될 예정입니다.')">
                🗑️ 계정 삭제
            </button>
        </div>

        <!-- 하단 버튼 -->
        <div style="text-align: center; margin-top: 40px; margin-bottom: 40px;">
            <a href="/" class="btn-secondary" style="display: inline-block; width: auto; padding: 14px 32px; text-decoration: none;">
                ← 홈으로 돌아가기
            </a>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer th:replace="~{index :: footer}"></footer>

</body>
</html>
