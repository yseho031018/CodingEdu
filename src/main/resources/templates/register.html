<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - CodeEdu</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 64px - 100px);
            display: flex; justify-content: center; align-items: center;
            background: var(--gray); padding: 40px;
        }
        .auth-card {
            background: var(--white); border-radius: 24px; padding: 40px;
            width: 100%; max-width: 440px; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            border: 1px solid #eee; text-align: center;
        }
        .auth-card h2 { font-size: 1.8rem; font-weight: 900; color: var(--blue); margin-bottom: 8px; }
        .auth-card p { font-size: .95rem; color: #666; margin-bottom: 30px; }
        
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: .85rem; font-weight: 700; color: var(--text-sub); margin-bottom: 8px; }
        .form-group input {
            width: 100%; padding: 14px 16px; border-radius: 12px; border: 2px solid #eaeaea;
            font-size: 1rem; transition: border-color .2s; outline: none;
        }
        .form-group input:focus { border-color: var(--blue-mid); }
        
        .btn-submit {
            width: 100%; background: var(--blue); color: var(--white); border: none;
            padding: 16px; border-radius: 12px; font-size: 1.05rem; font-weight: 800;
            cursor: pointer; transition: transform .15s, background .15s; margin-top: 10px;
        }
        .btn-submit:hover { background: var(--blue-mid); transform: translateY(-2px); }
        
        .auth-links { margin-top: 24px; font-size: .9rem; color: #666; }
        .auth-links a { color: var(--blue); font-weight: 700; text-decoration: none; margin-left: 6px; }
        .auth-links a:hover { text-decoration: underline; }

        .field-error { color: #C62828; font-size: .8rem; font-weight: 700; margin-top: 6px; display: block; }
        .input-error { border-color: #C62828 !important; }
    </style>
</head>
<body>

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>

<div class="auth-container">
    <div class="auth-card">
        <h2>🚀 1분만에 가입하기</h2>
        <p>가입하고 나만의 코딩 포트폴리오를 만들어보세요.</p>

        <form action="/register" method="POST">
            <!-- CSRF Token -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" placeholder="영문, 숫자 조합 (4자 이상)"
                       th:value="${user?.username}"
                       th:classappend="${fieldErrors?.containsKey('username')} ? 'input-error'"
                       autofocus>
                <span th:if="${fieldErrors?.containsKey('username')}" class="field-error"
                      th:text="${fieldErrors['username']}"></span>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="8자 이상 입력"
                       th:classappend="${fieldErrors?.containsKey('password')} ? 'input-error'">
                <span th:if="${fieldErrors?.containsKey('password')}" class="field-error"
                      th:text="${fieldErrors['password']}"></span>
            </div>

            <div class="form-group">
                <label for="nickname">닉네임</label>
                <input type="text" id="nickname" name="nickname" placeholder="커뮤니티에서 사용할 멋진 별명"
                       th:value="${user?.nickname}"
                       th:classappend="${fieldErrors?.containsKey('nickname')} ? 'input-error'">
                <span th:if="${fieldErrors?.containsKey('nickname')}" class="field-error"
                      th:text="${fieldErrors['nickname']}"></span>
            </div>

            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="email" placeholder="알림을 받을 이메일 주소"
                       th:value="${user?.email}"
                       th:classappend="${fieldErrors?.containsKey('email')} ? 'input-error'">
                <span th:if="${fieldErrors?.containsKey('email')}" class="field-error"
                      th:text="${fieldErrors['email']}"></span>
            </div>

            <button type="submit" class="btn-submit">무료로 가입 완료</button>
        </form>

        <div class="auth-links">
            이미 계정이 있으신가요? <a href="/login">로그인하러 가기</a>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer th:replace="~{index :: footer}"></footer>

</body>
</html>
