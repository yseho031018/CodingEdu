<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${quiz.title} + ' - CodeEdu'">퀴즈</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        /* 전체 페이지를 뷰포트에 고정 */
        html, body { height: 100%; overflow: hidden; }
        body { display: flex; flex-direction: column; }

        /* 네비 아래 공간을 전부 차지 */
        .quiz-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--gray);
            overflow: hidden;
            padding: 20px 16px 16px;
        }

        /* 중앙 정렬 컨테이너 */
        .quiz-take-wrap {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            min-height: 0; /* 필수: flex 자식이 줄어들 수 있게 */
        }

        /* 상단 정보 바 */
        .quiz-info-bar {
            background: var(--white); border-radius: 16px; padding: 14px 22px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee;
            flex-shrink: 0;
        }
        .quiz-info-title { font-size: 1.05rem; font-weight: 900; color: var(--text); }
        .quiz-topic { font-size: .78rem; color: #888; font-weight: 700; margin-bottom: 2px; }
        .quiz-timer { font-size: .9rem; font-weight: 900; color: var(--blue); background: var(--blue-light); padding: 6px 14px; border-radius: 50px; transition: background .3s, color .3s; }
        .quiz-timer.warn { background: #FFF3E0; color: #E65100; }
        .quiz-timer.danger { background: #FFEBEE; color: #C62828; animation: timerPulse .6s ease-in-out infinite; }
        @keyframes timerPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

        /* 진행률 */
        .progress-wrap { flex-shrink: 0; }
        .progress-bar { height: 7px; background: #e0e0e0; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--blue); border-radius: 10px; transition: width .4s; }
        .progress-label { display: flex; justify-content: space-between; font-size: .76rem; color: #888; margin-top: 4px; }

        /* form이 남은 공간을 전부 차지 */
        #quiz-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            min-height: 0; /* 필수 */
        }

        /* 문제 카드 - 남은 공간 채우고 내부 스크롤 */
        .q-card {
            display: none;
            background: var(--white); border-radius: 16px; padding: 22px 26px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee;
            flex: 1;
            min-height: 0; /* 필수 */
            overflow-y: auto;
        }
        .q-card.active { display: block; }

        .q-num { font-size: .8rem; font-weight: 800; color: var(--blue); margin-bottom: 10px; }
        .q-text { font-size: 1rem; font-weight: 800; color: var(--text); line-height: 1.55; margin-bottom: 16px; }

        .choices { display: flex; flex-direction: column; gap: 8px; }
        .choice-label {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            border-radius: 12px; border: 2px solid #eaeaea; cursor: pointer;
            transition: all .2s; background: #fafafa;
        }
        .choice-label:hover { border-color: var(--blue); background: var(--blue-light); }
        .choice-label input[type="radio"] { display: none; }
        .choice-label:has(input:checked) { border-color: var(--blue); background: var(--blue-light); }
        .choice-marker {
            width: 30px; height: 30px; border-radius: 50%; border: 2px solid #ddd;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: .82rem; flex-shrink: 0; background: white; transition: all .2s;
        }
        .choice-label:has(input:checked) .choice-marker { background: var(--blue); border-color: var(--blue); color: white; }
        .choice-text { font-size: .95rem; color: #333; font-weight: 600; }

        /* 미선택 경고 */
        .no-answer-msg {
            display: none; color: #C62828; font-size: .82rem; font-weight: 700;
            margin-top: 12px; padding: 9px 14px; background: #FFEBEE;
            border-radius: 8px; border-left: 4px solid #C62828;
        }

        /* 네비게이션 버튼 - 항상 하단에 */
        .nav-btns {
            display: flex; gap: 10px; flex-shrink: 0; padding-bottom: 4px;
        }
        .btn-prev {
            padding: 13px 24px; border-radius: 50px; border: 2px solid #eaeaea;
            background: var(--white); color: var(--text-sub); font-size: .95rem; font-weight: 800;
            cursor: pointer; transition: all .2s; white-space: nowrap;
        }
        .btn-prev:hover { border-color: var(--blue); color: var(--blue); }
        .btn-prev:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-next {
            flex: 1; padding: 13px; border-radius: 50px; border: none;
            background: var(--blue); color: white; font-size: .95rem; font-weight: 800;
            cursor: pointer; transition: all .2s;
        }
        .btn-next:hover { background: var(--blue-mid); }
        .btn-submit-quiz {
            flex: 1; padding: 13px; border-radius: 50px; border: none;
            background: #2E7D32; color: white; font-size: .95rem; font-weight: 800;
            cursor: pointer; transition: all .2s;
        }
        .btn-submit-quiz:hover { background: #1B5E20; }
    </style>
</head>
<body>

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>


<div class="quiz-page">
<div class="quiz-take-wrap">

    <!-- 상단 정보 바 -->
    <div class="quiz-info-bar">
        <div>
            <div class="quiz-topic" th:text="${quiz.icon + ' ' + quiz.topic}">⚡ JavaScript</div>
            <div class="quiz-info-title" th:text="${quiz.title}">퀴즈 제목</div>
        </div>
        <div style="display:flex; gap:14px; align-items:center; font-size:.85rem; color:#666;">
            <span th:text="'📋 ' + ${quiz.questionCount} + '문제'">📋 5문제</span>
            <div class="quiz-timer">⏱️ <span id="timer-display" th:attr="data-seconds=${quiz.timeLimit * 60}">00:00</span></div>
        </div>
    </div>

    <!-- 진행률 -->
    <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-label">
            <span id="progress-text">1번째 문제</span>
            <span><span id="current-num">1</span> / <span th:text="${quiz.questionCount}">5</span></span>
        </div>
    </div>

    <!-- 퀴즈 폼 -->
    <form id="quiz-form" th:action="@{/quiz/{id}/submit(id=${quiz.id})}" method="POST">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div th:each="question, stat : ${quiz.questions}"
             class="q-card"
             th:classappend="${stat.first} ? 'active'"
             th:attr="data-index=${stat.index}">
            <div class="q-num" th:text="'Q' + ${stat.count} + ' / ' + ${quiz.questionCount}">Q1 / 5</div>
            <div class="q-text" th:text="${question.questionText}">문제 내용</div>
            <div class="choices">
                <label th:each="choice, ci : ${question.choices}" class="choice-label">
                    <input type="radio"
                           th:name="'answer_' + ${question.id}"
                           th:value="${choice.id}"
                           class="q-radio">
                    <div class="choice-marker"
                         th:text="${ci.index == 0 ? 'A' : ci.index == 1 ? 'B' : ci.index == 2 ? 'C' : 'D'}">A</div>
                    <span class="choice-text" th:text="${choice.choiceText}">선택지</span>
                </label>
            </div>
            <div class="no-answer-msg" id="no-answer-msg">⚠️ 답을 선택해주세요!</div>
        </div>

        <!-- 네비게이션 버튼 -->
        <div class="nav-btns">
            <button type="button" class="btn-prev" id="btn-prev" onclick="prevQuestion()" disabled>← 이전</button>
            <button type="button" class="btn-next" id="btn-next" onclick="nextQuestion()">다음 문제 →</button>
            <button type="submit" class="btn-submit-quiz" id="btn-submit" style="display:none;"
                    onclick="return confirm('퀴즈를 제출하시겠습니까?')">✅ 제출하기</button>
        </div>
    </form>

</div>
</div>

<script>
    const cards = document.querySelectorAll('.q-card');
    const total = cards.length;
    let current = 0;

    function showQuestion(idx) {
        cards.forEach(c => c.classList.remove('active'));
        cards[idx].classList.add('active');

        document.getElementById('no-answer-msg').style.display = 'none';
        document.getElementById('btn-prev').disabled = (idx === 0);

        const isLast = (idx === total - 1);
        document.getElementById('btn-next').style.display   = isLast ? 'none'  : 'block';
        document.getElementById('btn-submit').style.display = isLast ? 'block' : 'none';

        const pct = ((idx + 1) / total) * 100;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('current-num').textContent = idx + 1;
        document.getElementById('progress-text').textContent = `${idx + 1}번째 문제`;

        current = idx;
    }

    function isCurrentAnswered() {
        const card = cards[current];
        const radios = card.querySelectorAll('input[type="radio"]');
        const name = radios[0]?.name;
        return name ? !!document.querySelector(`input[name="${name}"]:checked`) : false;
    }

    function nextQuestion() {
        if (!isCurrentAnswered()) {
            document.getElementById('no-answer-msg').style.display = 'block';
            return;
        }
        if (current < total - 1) showQuestion(current + 1);
    }

    function prevQuestion() {
        if (current > 0) showQuestion(current - 1);
    }

    // 타이머
    const timerEl = document.getElementById('timer-display');
    const timerWrap = timerEl.closest('.quiz-timer');
    let remaining = parseInt(timerEl.dataset.seconds, 10);
    function updateTimer() {
        const m = String(Math.floor(remaining / 60)).padStart(2, '0');
        const s = String(remaining % 60).padStart(2, '0');
        timerEl.textContent = m + ':' + s;
        timerWrap.classList.remove('warn', 'danger');
        if (remaining <= 30) timerWrap.classList.add('danger');
        else if (remaining <= 60) timerWrap.classList.add('warn');
    }
    updateTimer();
    const iv = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
            clearInterval(iv);
            timerEl.textContent = '시간 초과!';
            timerWrap.classList.add('danger');
            // 미답변 항목 포함해서 자동 제출
            document.getElementById('quiz-form').submit();
            return;
        }
        updateTimer();
    }, 1000);
</script>
</body>
</html>
