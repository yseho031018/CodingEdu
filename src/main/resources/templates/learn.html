<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습하기 - CodeEdu</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .filter-bar { display: flex; gap: 10px; margin-bottom: 44px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 20px; border-radius: 50px; border: 2px solid #e8e8e8;
            background: #fff; font-size: .875rem; font-weight: 600; color: var(--text-sub);
            cursor: pointer; transition: all .2s;
        }
        .filter-btn:hover { border-color: var(--blue-mid); color: var(--blue-mid); }
        .filter-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

        .learn-section { margin-bottom: 60px; }
        .learn-section.hidden { display: none; }
        .category-title {
            font-size: 1.25rem; font-weight: 800; color: var(--text);
            margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--blue-light);
        }

        .language-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .language-card {
            display: block; text-decoration: none; background: #fff;
            border: 2px solid #e8e8e8; border-radius: 16px; padding: 24px 20px;
            transition: all .2s; color: var(--text); position: relative;
        }
        .language-card:hover { border-color: var(--blue-mid); box-shadow: 0 6px 24px rgba(21,101,192,.12); transform: translateY(-4px); }

        .lang-icon {
            width: 56px; height: 56px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; font-weight: 900; margin-bottom: 14px;
        }
        .lang-icon.html    { background: #FFF3E0; color: #E64A19; }
        .lang-icon.css     { background: #E3F2FD; color: #1565C0; }
        .lang-icon.js      { background: #FFFDE7; color: #F57F17; }
        .lang-icon.ts      { background: #E8EAF6; color: #3949AB; }
        .lang-icon.java    { background: #FFF3E0; color: #BF360C; }
        .lang-icon.kotlin  { background: #E8F5E9; color: #2E7D32; }
        .lang-icon.c       { background: #E3F2FD; color: #0D47A1; }
        .lang-icon.cpp     { background: #E8EAF6; color: #283593; }
        .lang-icon.swift   { background: #FFF3E0; color: #E65100; }
        .lang-icon.python  { background: #E8F5E9; color: #1B5E20; }

        .language-card h3 { font-size: 1rem; font-weight: 800; color: var(--text); margin-bottom: 6px; }
        .language-card p { font-size: .82rem; color: var(--text-sub); line-height: 1.5; margin-bottom: 14px; }
        .card-meta { display: flex; align-items: center; justify-content: space-between; }
        .lang-level { font-size: .72rem; font-weight: 700; padding: 3px 10px; border-radius: 50px; }
        .lang-level.beginner     { background: #E8F5E9; color: #2E7D32; }
        .lang-level.intermediate { background: #E3F2FD; color: #1565C0; }
        .lang-level.advanced     { background: #FBE9E7; color: #BF360C; }
        .lesson-count { font-size: .78rem; color: #aaa; font-weight: 600; }

        /* 진도 바 (로그인 시) */
        .progress-mini { margin-top: 12px; }
        .progress-mini-bar { height: 4px; background: #eee; border-radius: 10px; overflow: hidden; }
        .progress-mini-fill { height: 100%; background: var(--blue); border-radius: 10px; }
        .progress-mini-label { font-size: .7rem; color: #888; margin-top: 4px; }

        @media (max-width: 768px) { .language-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; } }
    </style>
</head>
<body>

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>

<!-- PAGE HEADER -->
<section class="page-header">
    <h1>📚 학습하기</h1>
    <p>원하는 프로그래밍 언어를 선택하고 학습을 시작하세요!</p>
</section>

<!-- MAIN CONTENT -->
<section style="padding: 48px 5%;">

    <!-- 카테고리 필터 -->
    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="web">🌐 웹 개발</button>
        <button class="filter-btn" data-filter="java">☕ Java 계열</button>
        <button class="filter-btn" data-filter="c">💻 C 계열</button>
        <button class="filter-btn" data-filter="mobile">📱 모바일</button>
        <button class="filter-btn" data-filter="etc">🔧 기타 언어</button>
    </div>

    <!-- 카테고리별 섹션 -->
    <th:block th:with="
        webCourses    = ${courses.?[category == 'web']},
        javaCourses   = ${courses.?[category == 'java']},
        cCourses      = ${courses.?[category == 'c']},
        mobileCourses = ${courses.?[category == 'mobile']},
        etcCourses    = ${courses.?[category == 'etc']}
    ">

        <!-- 웹 개발 -->
        <div class="learn-section" data-category="web" th:if="${!webCourses.isEmpty()}">
            <h2 class="category-title">🌐 웹 개발</h2>
            <div class="language-grid">
                <a th:each="c : ${webCourses}"
                   th:href="@{/learn/{lang}(lang=${c.lang})}"
                   class="language-card">
                    <div class="lang-icon" th:classappend="${c.lang == 'javascript' ? 'js' : c.lang == 'typescript' ? 'ts' : c.lang}"
                         th:text="${c.icon}"></div>
                    <h3 th:text="${c.title}">강의명</h3>
                    <p th:text="${c.description}">설명</p>
                    <div class="card-meta">
                        <span class="lang-level" th:classappend="${c.level}"
                              th:text="${c.level == 'beginner' ? '입문' : c.level == 'intermediate' ? '초급' : '중급'}">입문</span>
                        <span class="lesson-count" th:text="'📖 ' + ${c.lessonCount} + '강'">📖 5강</span>
                    </div>
                    <!-- 로그인 시 진도 표시 -->
                    <div class="progress-mini" th:if="${completedCounts != null}"
                         th:with="done=${completedCounts[c.lang] ?: 0}">
                        <div class="progress-mini-bar">
                            <div class="progress-mini-fill"
                                 th:style="'width:' + ${c.lessonCount > 0 ? done * 100 / c.lessonCount : 0} + '%'"></div>
                        </div>
                        <div class="progress-mini-label" th:text="${done} + '/' + ${c.lessonCount} + ' 완료'">0/5 완료</div>
                    </div>
                </a>
            </div>
        </div>

        <!-- Java 계열 -->
        <div class="learn-section" data-category="java" th:if="${!javaCourses.isEmpty()}">
            <h2 class="category-title">☕ Java 계열</h2>
            <div class="language-grid">
                <a th:each="c : ${javaCourses}"
                   th:href="@{/learn/{lang}(lang=${c.lang})}"
                   class="language-card">
                    <div class="lang-icon" th:classappend="${c.lang}" th:text="${c.icon}"></div>
                    <h3 th:text="${c.title}">강의명</h3>
                    <p th:text="${c.description}">설명</p>
                    <div class="card-meta">
                        <span class="lang-level" th:classappend="${c.level}"
                              th:text="${c.level == 'beginner' ? '입문' : c.level == 'intermediate' ? '초급' : '중급'}">초급</span>
                        <span class="lesson-count" th:text="'📖 ' + ${c.lessonCount} + '강'">📖 4강</span>
                    </div>
                    <div class="progress-mini" th:if="${completedCounts != null}"
                         th:with="done=${completedCounts[c.lang] ?: 0}">
                        <div class="progress-mini-bar">
                            <div class="progress-mini-fill"
                                 th:style="'width:' + ${c.lessonCount > 0 ? done * 100 / c.lessonCount : 0} + '%'"></div>
                        </div>
                        <div class="progress-mini-label" th:text="${done} + '/' + ${c.lessonCount} + ' 완료'">0/4 완료</div>
                    </div>
                </a>
            </div>
        </div>

        <!-- C 계열 -->
        <div class="learn-section" data-category="c" th:if="${!cCourses.isEmpty()}">
            <h2 class="category-title">💻 C 계열</h2>
            <div class="language-grid">
                <a th:each="c : ${cCourses}"
                   th:href="@{/learn/{lang}(lang=${c.lang})}"
                   class="language-card">
                    <div class="lang-icon" th:classappend="${c.lang}" th:text="${c.icon}"></div>
                    <h3 th:text="${c.title}">강의명</h3>
                    <p th:text="${c.description}">설명</p>
                    <div class="card-meta">
                        <span class="lang-level" th:classappend="${c.level}"
                              th:text="${c.level == 'beginner' ? '입문' : c.level == 'intermediate' ? '초급' : '중급'}">입문</span>
                        <span class="lesson-count" th:text="'📖 ' + ${c.lessonCount} + '강'">📖 5강</span>
                    </div>
                    <div class="progress-mini" th:if="${completedCounts != null}"
                         th:with="done=${completedCounts[c.lang] ?: 0}">
                        <div class="progress-mini-bar">
                            <div class="progress-mini-fill"
                                 th:style="'width:' + ${c.lessonCount > 0 ? done * 100 / c.lessonCount : 0} + '%'"></div>
                        </div>
                        <div class="progress-mini-label" th:text="${done} + '/' + ${c.lessonCount} + ' 완료'">0/5 완료</div>
                    </div>
                </a>
            </div>
        </div>

        <!-- 모바일 -->
        <div class="learn-section" data-category="mobile" th:if="${!mobileCourses.isEmpty()}">
            <h2 class="category-title">📱 모바일 개발</h2>
            <div class="language-grid">
                <a th:each="c : ${mobileCourses}"
                   th:href="@{/learn/{lang}(lang=${c.lang})}"
                   class="language-card">
                    <div class="lang-icon" th:classappend="${c.lang}" th:text="${c.icon}"></div>
                    <h3 th:text="${c.title}">강의명</h3>
                    <p th:text="${c.description}">설명</p>
                    <div class="card-meta">
                        <span class="lang-level" th:classappend="${c.level}"
                              th:text="${c.level == 'beginner' ? '입문' : c.level == 'intermediate' ? '초급' : '중급'}">초급</span>
                        <span class="lesson-count" th:text="'📖 ' + ${c.lessonCount} + '강'">📖 4강</span>
                    </div>
                    <div class="progress-mini" th:if="${completedCounts != null}"
                         th:with="done=${completedCounts[c.lang] ?: 0}">
                        <div class="progress-mini-bar">
                            <div class="progress-mini-fill"
                                 th:style="'width:' + ${c.lessonCount > 0 ? done * 100 / c.lessonCount : 0} + '%'"></div>
                        </div>
                        <div class="progress-mini-label" th:text="${done} + '/' + ${c.lessonCount} + ' 완료'">0/4 완료</div>
                    </div>
                </a>
            </div>
        </div>

        <!-- 기타 -->
        <div class="learn-section" data-category="etc" th:if="${!etcCourses.isEmpty()}">
            <h2 class="category-title">🔧 기타 언어</h2>
            <div class="language-grid">
                <a th:each="c : ${etcCourses}"
                   th:href="@{/learn/{lang}(lang=${c.lang})}"
                   class="language-card">
                    <div class="lang-icon" th:classappend="${c.lang}" th:text="${c.icon}"></div>
                    <h3 th:text="${c.title}">강의명</h3>
                    <p th:text="${c.description}">설명</p>
                    <div class="card-meta">
                        <span class="lang-level" th:classappend="${c.level}"
                              th:text="${c.level == 'beginner' ? '입문' : c.level == 'intermediate' ? '초급' : '중급'}">입문</span>
                        <span class="lesson-count" th:text="'📖 ' + ${c.lessonCount} + '강'">📖 5강</span>
                    </div>
                    <div class="progress-mini" th:if="${completedCounts != null}"
                         th:with="done=${completedCounts[c.lang] ?: 0}">
                        <div class="progress-mini-bar">
                            <div class="progress-mini-fill"
                                 th:style="'width:' + ${c.lessonCount > 0 ? done * 100 / c.lessonCount : 0} + '%'"></div>
                        </div>
                        <div class="progress-mini-label" th:text="${done} + '/' + ${c.lessonCount} + ' 완료'">0/5 완료</div>
                    </div>
                </a>
            </div>
        </div>
    </th:block>

</section>

<!-- FOOTER -->
<footer th:replace="~{index :: footer}"></footer>

<script>
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const filter = this.dataset.filter;
            document.querySelectorAll('.learn-section').forEach(sec => {
                sec.classList.toggle('hidden', filter !== 'all' && sec.dataset.category !== filter);
            });
        });
    });
</script>
</body>
</html>
