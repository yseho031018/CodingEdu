<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - CodeEdu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/tailwind.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 68px - 88px);
            display: flex; justify-content: center; align-items: flex-start;
            background: var(--bg-section); padding: 40px 20px;
        }
        .auth-card {
            background: var(--bg-surface);
            border-radius: 26px; padding: 44px 40px;
            width: 100%; max-width: 440px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-card);
        }
        .auth-logo {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-bottom: 28px; text-decoration: none;
        }
        .auth-logo-mark {
            width: 36px; height: 36px; border-radius: 11px;
            background: var(--accent); display: flex; align-items: center;
            justify-content: center; font-size: 1.1rem; color: #fff;
        }
        .auth-logo-name {
            font-size: 1.3rem; font-weight: 800; color: var(--ink-1);
            letter-spacing: -0.025em;
        }
        .auth-title {
            font-size: 1.55rem; font-weight: 800; color: var(--ink-1);
            margin-bottom: 6px; letter-spacing: -0.03em; text-align: center;
        }
        .auth-sub {
            font-size: .88rem; color: var(--ink-2); margin-bottom: 32px;
            text-align: center; line-height: 1.6;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: .82rem; font-weight: 600;
            color: var(--ink-1); margin-bottom: 7px;
        }
        .form-group input {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            border: 1.5px solid var(--border-card);
            background: var(--bg-surface); color: var(--ink-1);
            font-size: .93rem; font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s; outline: none;
        }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(107,92,231,0.14);
        }
        .form-group input::placeholder { color: var(--ink-3); }
        .form-group input.input-error { border-color: var(--danger); }
        .form-group input.input-error:focus {
            box-shadow: 0 0 0 3px rgba(220,38,38,0.12);
        }
        .field-error {
            color: var(--danger); font-size: .78rem; font-weight: 600;
            margin-top: 6px; display: block;
        }
        .btn-submit {
            width: 100%; background: var(--accent); color: #fff; border: none;
            padding: 14px; border-radius: 14px; font-size: .97rem; font-weight: 700;
            cursor: pointer; letter-spacing: -0.01em;
            transition: background 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
            box-shadow: 0 2px 14px rgba(107,92,231,0.28); margin-top: 10px;
        }
        .btn-submit:hover {
            background: var(--accent-h);
            transform: translateY(-2px);
            box-shadow: 0 4px 22px rgba(107,92,231,0.40);
        }
        .auth-links { margin-top: 22px; font-size: .86rem; color: var(--ink-2); text-align: center; }
        .auth-links a { color: var(--accent); font-weight: 600; text-decoration: none; margin-left: 4px; }
        .auth-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<nav th:replace="~{index :: nav}"></nav>

<div class="auth-container">
    <div class="auth-card reveal">

        <a href="/" class="auth-logo reveal">
            <div class="auth-logo-mark">💻</div>
            <span class="auth-logo-name">CodeEdu</span>
        </a>

        <h2 class="auth-title">1분만에 가입하기</h2>
        <p class="auth-sub">가입하고 나만의 코딩 포트폴리오를 만들어보세요.</p>

        <form id="registerForm" action="/register" method="POST">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" placeholder="영문, 숫자 조합 4자 이상"
                       th:value="${user?.username}"
                       th:classappend="${fieldErrors?.containsKey('username')} ? ' input-error'"
                       th:attr="aria-invalid=${fieldErrors?.containsKey('username')} ? 'true' : 'false'"
                       th:attrappend="${fieldErrors?.containsKey('username')} ? 'aria-describedby=err-username' : ''"
                       autofocus>
                <span th:if="${fieldErrors?.containsKey('username')}" id="err-username" class="field-error" role="alert"
                      th:text="${fieldErrors['username']}"></span>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="8자 이상 입력"
                       th:classappend="${fieldErrors?.containsKey('password')} ? ' input-error'"
                       th:attr="aria-invalid=${fieldErrors?.containsKey('password')} ? 'true' : 'false'"
                       th:attrappend="${fieldErrors?.containsKey('password')} ? 'aria-describedby=err-password' : ''">
                <span th:if="${fieldErrors?.containsKey('password')}" id="err-password" class="field-error" role="alert"
                      th:text="${fieldErrors['password']}"></span>
            </div>

            <div class="form-group">
                <label for="nickname">닉네임</label>
                <input type="text" id="nickname" name="nickname" placeholder="커뮤니티에서 사용할 별명"
                       th:value="${user?.nickname}"
                       th:classappend="${fieldErrors?.containsKey('nickname')} ? ' input-error'"
                       th:attr="aria-invalid=${fieldErrors?.containsKey('nickname')} ? 'true' : 'false'"
                       th:attrappend="${fieldErrors?.containsKey('nickname')} ? 'aria-describedby=err-nickname' : ''">
                <span th:if="${fieldErrors?.containsKey('nickname')}" id="err-nickname" class="field-error" role="alert"
                      th:text="${fieldErrors['nickname']}"></span>
            </div>

            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="email" placeholder="알림을 받을 이메일 주소"
                       th:value="${user?.email}"
                       th:classappend="${fieldErrors?.containsKey('email')} ? ' input-error'"
                       th:attr="aria-invalid=${fieldErrors?.containsKey('email')} ? 'true' : 'false'"
                       th:attrappend="${fieldErrors?.containsKey('email')} ? 'aria-describedby=err-email' : ''">
                <span th:if="${fieldErrors?.containsKey('email')}" id="err-email" class="field-error" role="alert"
                      th:text="${fieldErrors['email']}"></span>
            </div>

            <button type="submit" class="btn-submit">무료로 가입 완료</button>
        </form>

        <div class="auth-links">
            이미 계정이 있으신가요? <a href="/login">로그인하러 가기</a>
        </div>
    </div>
</div>

<footer th:replace="~{index :: footer}"></footer>

<script>
(function () {
  var form = document.getElementById('registerForm');
  if (!form) return;
  form.addEventListener('submit', function () {
    if (!form.reportValidity()) return;
    var btn = form.querySelector('button[type="submit"]');
    if (btn) btn.disabled = true;
  });
})();
</script>
</body>
</html>
